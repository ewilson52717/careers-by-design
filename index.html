  <style>
    /* ── Careers by Design · app theme ─────────────────────────────────────

    :root {
      --cream:     #f7fafd;  /* page bg (kept var name for back-compat) */

      --ink:       #111827;  /* gray-900 */
      --ink-2:     #374151;  /* gray-700 */
      --ink-3:     #6b7280;  /* gray-500 */

      --edge-soft: #f3f4f6;  /* gray-100 */
      --parchment: #eef2ff;  /* indigo-50 — ghost/hover tint */
      --ember:     #4f46e5;  /* indigo-600 — primary accent */
      --ember-2:   #3730a3;  /* indigo-800 — hover */
      --ember-3:   #06b6d4;  /* cyan-500 — gradient companion */
      --moss:      #06b6d4;  /* cyan-500 — secondary accent */
      --indigo:    var(--ember);
      --cyan:      var(--moss);
    }
    * { box-sizing: border-box; }
    html, body { background: var(--cream); }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink-2); min-height: 100vh; }
    h1,h2,h3,h4,.font-headline { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; letter-spacing: -0.01em; color: var(--ink); }
    h1,h2 { letter-spacing: -0.02em; }
    .font-serif { font-family: 'Plus Jakarta Sans', sans-serif; }
    .brand-grad { background: linear-gradient(135deg, var(--ember) 0%, var(--ember-3) 100%); }
    .gradient-text { background: linear-gradient(135deg, var(--ember), var(--ember-3)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .card { background: var(--ivory); border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); border:1px solid var(--edge); }
    .card-hover:hover { box-shadow:0 10px 25px rgba(79,70,229,.1); transform:translateY(-2px); transition:all .2s; }
    .chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .chip-green {background:#ecfdf5; color:#047857}

    .chip-red   {background:#fef2f2; color:#b91c1c}
    .chip-gray  {background:#f3f4f6; color:#374151}
    .chip-purple{background:#f5f3ff; color:#6d28d9}
    input,textarea,select { background: var(--ivory); color: var(--ink); border: 1px solid var(--edge); }
    input:focus,textarea:focus,select:focus { outline:none; border-color: var(--ember) !important; box-shadow:0 0 0 3px rgba(79,70,229,.15); }
    .btn { padding:10px 18px; border-radius:10px; font-weight:600; font-size:14px; transition:all .15s; cursor:pointer; border:none; letter-spacing:.005em; }
    .btn-primary { background: var(--ember); color: var(--ivory); }
    .btn-primary:hover { background: var(--ember-2); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-secondary { background: var(--ivory); color: var(--ink-2); border:1px solid var(--edge); }
    .btn-secondary:hover { background: var(--parchment); }
    .btn-ghost { background:transparent; color: var(--ember); padding:6px 10px; border-radius:8px; font-weight:600; font-size:13px; }
    .btn-ghost:hover { background: var(--parchment); }
    .nav-btn { padding:8px 16px; border-radius:10px; font-weight:500; font-size:14px; color: var(--ink-2); transition:all .15s; cursor:pointer; border:none; background:transparent; }
    .nav-btn:hover { background: var(--parchment); color: var(--ink); }
    .nav-btn.active { background: var(--ink); color: var(--cream); }
    .progress-bar { height:6px; background: var(--edge-soft); border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg, var(--ember), var(--ember-3)); border-radius:999px; transition:width .4s; }
    .slide-in { animation:slideIn .25s ease-out; }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .modal-back { background:rgba(17,24,39,.5); position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
    .spinner { width:20px; height:20px; border:2px solid rgba(255,253,248,.3); border-top-color: var(--ivory); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-dots span { animation:bounce 1.4s infinite ease-in-out both; display:inline-block; width:7px; height:7px; border-radius:50%; background: var(--ember); margin:0 2px; }
    .loading-dots span:nth-child(1) { animation-delay:-.32s } .loading-dots span:nth-child(2) { animation-delay:-.16s }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
    .glass-header { background:rgba(250,248,244,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--edge); }
    .setup-step { counter-increment:step; }
    .setup-step::before { content:counter(step); display:flex; align-items:center; justify-content:center; width:28px; height:28px; background: var(--ember); color: white; border-radius:50%; font-weight:700; font-size:13px; flex-shrink:0; }
    ol.setup-list { counter-reset:step; list-style:none; padding:0; }
    /* subtle text-selection */
    ::selection { background: var(--parchment); color: var(--ink); }
    /* ── Swipe deck ── */
    .swipe-deck-back { position:fixed; inset:0; z-index:50; background:linear-gradient(180deg, rgba(17,24,39,.85), rgba(79,70,229,.75)); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:24px 16px; overflow:hidden; }
    .swipe-stack { position:relative; width:100%; max-width:460px; height:560px; }
    .swipe-card { position:absolute; inset:0; background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,.25); overflow:hidden; display:flex; flex-direction:column; touch-action:none; user-select:none; }
    .swipe-card.drag { transition:none; cursor:grabbing; }
    .swipe-card.rest { transition:transform .28s cubic-bezier(.2,.8,.2,1), opacity .28s; cursor:grab; }
    .swipe-card.gone-right { transform:translate(140%,-40px) rotate(22deg); opacity:0; }
    .swipe-card.gone-left  { transform:translate(-140%,-40px) rotate(-22deg); opacity:0; }
    .swipe-stamp { position:absolute; top:36px; padding:8px 16px; border:3px solid currentColor; border-radius:8px; font-weight:900; font-size:28px; letter-spacing:2px; text-transform:uppercase; opacity:0; transition:opacity .1s; pointer-events:none; }
    .swipe-stamp.like { right:24px; color:#10b981; transform:rotate(12deg); }
    .swipe-stamp.nope { left:24px;  color:#ef4444; transform:rotate(-12deg); }
    /* link default */
    a { color: var(--ember); }
    a:hover { color: var(--ember-2); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  CAREERS BY DESIGN  —  Production app
//  Stack: Google OAuth · Google Sheets API · Apps Script proxy
//  Hosting: GitHub Pages → careers.spendbydesign.co (GoDaddy CNAME)
// ═══════════════════════════════════════════════════════════════════════

// ── ① CONFIGURATION  ──────────────────────────────────────────────────
//  Fill in these four values before deploying. See SETUP_GUIDE.md.
const CONFIG = {
  CLIENT_ID:       '1013190318117-n1ve6s2te8j3f7io4g1knht315jap8dm.apps.googleusercontent.com',
  SHEET_ID:        '1ssdOfq9MMtImXFswNhzgKdu2qKmyfyq9Q7Y73M46k9k',
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyOQu3sz-FicBZX57LVfgaFiRW8F-OO-aKWOrUOfyV5-hYl2WyygZUKAr67-t4vSCUw_Q/exec',
  COACH_EMAILS:    ['elyserwilson@gmail.com'],
  APP_NAME:        'Careers by Design',
  APP_TAGLINE:     'Spend your job hunt wisely.',
};
const SETUP_COMPLETE = !CONFIG.CLIENT_ID.includes('YOUR_') &&
                       !CONFIG.SHEET_ID.includes('YOUR_') &&
                       !CONFIG.APPS_SCRIPT_URL.includes('YOUR_');

// ── ② AUTH LAYER  ─────────────────────────────────────────────────────
let tokenClient = null, accessToken = null, currentUser = null;

// Persist session in localStorage so refreshes, new tabs, and short browser
// restarts don't force a re-login. We honor the token's own expiry (Google
// issues ~1-hour tokens); once expired the user signs in again.
const SESSION_KEY = 'cbd.session.v1';

function saveSession(tokenResp) {
  try {
    const expiresAt = Date.now() + ((tokenResp?.expires_in || 3500) * 1000);
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      accessToken: tokenResp.access_token,
      user: currentUser,
      expiresAt,
    }));
  } catch (e) { /* storage may be disabled; fail silently */ }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (!saved?.accessToken || !saved.expiresAt || !saved.user?.email) return null;
    // 30-second safety buffer so we don't hand the proxy a token about to expire mid-request
    if (Date.now() >= saved.expiresAt - 30_000) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return saved;
  } catch { return null; }
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

function initAuth() {
  if (!window.google?.accounts) { setTimeout(initAuth, 300); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    // Non-sensitive scopes only. Sheet reads/writes go through the Apps
    // Script proxy, so neither clients nor coaches need direct Sheet access.
    scope: 'https://www.googleapis.com/auth/userinfo.email ' +
           'https://www.googleapis.com/auth/userinfo.profile',
    callback: async (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error, 'red'); return; }
      accessToken = resp.access_token;
      await fetchUserInfo();
      saveSession(resp);
      await loadAndBoot();
    },
  });
}

async function fetchUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
    { headers: { Authorization: `Bearer ${accessToken}` } });
  const info = await res.json();
  currentUser = { email: info.email, name: info.name, picture: info.picture };
}

function signIn() {
  if (!SETUP_COMPLETE) { setState({ page: 'setup' }); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}
function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; currentUser = null;
  clearSession();
  state = { page: 'login' };
  render();
}

// Called when the proxy tells us the token is no longer valid. Clears the
// stored session and kicks the user back to the login screen so they can
// sign in fresh. Avoids spinning in a retry loop on a dead token.
function handleExpiredSession() {
  accessToken = null; currentUser = null;
  clearSession();
  state = { page: 'login' };
  render();
  showToast('Your session expired — please sign in again', 'red');
}
const isCoach = () => CONFIG.COACH_EMAILS.map(e=>e.toLowerCase()).includes(currentUser?.email?.toLowerCase());

// ── ②b COACH VIEW-AS HELPERS  ─────────────────────────────────────────
// A coach/admin can optionally "view as" a client to preview what the client sees.
// viewAs = null          → normal coach dashboard
// viewAs = 'self'        → coach previews the client experience using their own email
// viewAs = '<email>'     → coach previews the experience of a specific client
let viewAs = null;
const isViewingAsClient = () => isCoach() && viewAs !== null;
const viewedEmail = () => viewAs && viewAs !== 'self' ? viewAs : currentUser?.email;

// ── ③ DATA LAYER — every request goes through the Apps Script proxy  ──
//  The front-end no longer hits the Sheets API directly. This means:
//   • clients never need access to the raw Sheet
//   • the server (Apps Script, running as the coach) is the only thing that
//     reads/writes rows, and it enforces per-email scoping
//   • the OAuth scope can stay small (userinfo only)

// Low-level: fires one POST to the Apps Script Web App. Errors bubble up.
// If the proxy reports the token is no longer valid, we clear the saved
// session and bounce the user back to login.
async function scriptCall(payload) {
  // Content-Type MUST be text/plain — application/json triggers a CORS
  // preflight that Apps Script Web Apps don't answer. Apps Script reads
  // the raw body via e.postData.contents regardless of content-type.
  const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ ...payload, token: accessToken }),
  });
  if (!res.ok) {
    throw new Error(`HTTP ${res.status} — is your Apps Script deployed with "Who has access: Anyone"?`);
  }
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error(`Non-JSON response (likely a Google login page). First 120 chars: ${text.slice(0,120)}`); }
  if (!data.ok) {
    // Token has expired or been revoked — kick back to login cleanly
    if (/unauthorized/i.test(data.error || '') || /invalid_token/i.test(data.error || '')) {
      handleExpiredSession();
    }
    throw new Error(data.error || 'Script error');
  }
  return data;
}

// For reads: let errors propagate so loadAndBoot can show a proper error screen.
async function scriptGet(payload) {
  return scriptCall(payload);
}

// For writes: also surface a toast so the user knows their save failed.
async function scriptPost(payload) {
  try {
    return await scriptCall(payload);
  } catch (e) {
    console.error('[scriptPost]', e);
    showToast(`Save failed — ${e.message || 'check your Apps Script URL'}`, 'red');
    throw e;
  }
}

// ── ④ DATA LOADING  ───────────────────────────────────────────────────
async function loadAndBoot() {
  showLoadingScreen('Loading your profile…');
  try {
    if (isCoach() && !isViewingAsClient()) {
      await loadAllClients();
    } else if (isViewingAsClient()) {
      await loadClientByEmail(viewedEmail());
    } else {
      await loadMyProfile();
    }
    render();
  } catch (err) {
    console.error('Boot error:', err);
    if (err.message?.includes('404') || err.message?.includes('does not exist')) {
      // Sheet not set up yet
      state = { page: 'sheet-missing' };
    } else {
      state = { page: 'error', errorMsg: err.message };
    }
    render();
  }
}

// Parses a scoped-data response (from get_my_data / get_client_data) into a
// fully-shaped client object. Returns null if the client row doesn't exist
// yet (new user who hasn't registered).
function hydrateClient(resp) {
  const clientRows = resp.clients?.values || [];
  const headers    = clientRows[0] || [];
  const row        = clientRows[1];
  if (!row) return null;
  const client = rowToClient(headers, row);
  client.jobs = (resp.jobs?.values || []).slice(1).map(rowToJob);
  client.interviewPrep = buildPrepSummary((resp.prep?.values || []).slice(1));
  return client;
}

async function loadMyProfile() {
  const resp = await scriptGet({ action: 'get_my_data' });
  const client = hydrateClient(resp);
  if (!client) { state = { page: 'register' }; return; }
  state = { page: 'client', client, tab: 'intake' };
}

// Coach previews exactly what a chosen client sees. If the target row doesn't
// exist yet (e.g. the coach previewing as "self" before completing intake),
// we fall through to the registration page just like a normal client would.
async function loadClientByEmail(email) {
  const resp = await scriptGet({ action: 'get_client_data', email });
  const client = hydrateClient(resp);
  if (!client) { state = { page: 'register' }; return; }
  state = { page: 'client', client, tab: 'intake' };
}

async function loadAllClients() {
  const resp = await scriptGet({ action: 'get_all_data' });
  const headers    = (resp.clients?.values || [])[0] || [];
  const clientRows = (resp.clients?.values || []).slice(1);
  const allJobs    = (resp.jobs?.values    || []).slice(1);
  const allPrep    = (resp.prep?.values    || []).slice(1);

  const clients = clientRows.map(row => {
    const c = rowToClient(headers, row);
    c.jobs = allJobs.filter(r => r[0] === c.email).map(rowToJob);
    c.interviewPrep = buildPrepSummary(allPrep.filter(r => r[0] === c.email));
    return c;
  });
  state = { page: 'coach', clients, drawerClient: null };
}

// ── ⑤ ROW PARSERS  ────────────────────────────────────────────────────
// Clients sheet columns: email|name|created_at|questionnaire|profile|dashboard_notes|daily_alerts|coach_notes|coach_alerts
function rowToClient(headers, row) {
  const g = (key) => row[headers.indexOf(key)] || '';
  let questionnaire = null, profile = null;
  try { questionnaire = JSON.parse(g('questionnaire') || 'null'); } catch(e) {}
  try { profile = JSON.parse(g('profile') || 'null'); } catch(e) {}
  return {
    email: g('email'), name: g('name'), createdAt: g('created_at'),
    avatar: initials(g('name')),
    resume: { uploaded: !!questionnaire?.resumeSummary, summary: questionnaire?.resumeSummary || '', fileName: questionnaire?.resumeFile || '' },
    questionnaire, profile: profile || { analyzed: false },
    dashboardNotes: g('dashboard_notes'),
    dailyAlerts: g('daily_alerts') === 'true',
    coachNotes: g('coach_notes'),
    coachAlerts: parseInt(g('coach_alerts') || '0', 10),
  };
}

// Jobs sheet columns: client_email|id|title|company|location|salary|source|posted|match|status|notes|need_app|created_at|url|extra
// `extra` is a JSON blob holding description, company/culture data,
// application drafts, and submission status. Stored as JSON so we can add
// fields without migrating the sheet.
function rowToJob(row) {
  let extra = {};
  try { extra = row[14] ? JSON.parse(row[14]) : {}; } catch { extra = {}; }
  return {
    clientEmail: row[0], id: row[1], title: row[2], company: row[3],
    location: row[4], salary: row[5], source: row[6], posted: row[7],
    match: parseInt(row[8] || '75', 10), status: row[9] || 'new',
    notes: row[10] || '', needApp: row[11] || null,
    url: row[13] || '',
    extra, // { description, website, company:{...}, application:{...}, submission:{...} }
  };
}

// PrepSessions columns: client_email|id|type|status|score|note
function buildPrepSummary(rows) {
  const sessions = rows.map(r => ({
    id: r[1], type: r[2], status: r[3] || 'todo',
    score: r[4] ? parseInt(r[4]) : null, note: r[5] || '',
  }));
  return { sessions, completed: sessions.filter(s => s.status === 'done').length, total: sessions.length };
}

function initials(name) {
  const parts = (name || '?').trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || '??';
}

// ── CURRENCY HELPERS  ──────────────────────────────────────────────────
//  - formatCurrency(120000) → "$120,000"
//  - parseCurrency("$120,000") → 120000
//  Used by money inputs (salary floor, etc.) which display formatted
//  but store raw integers under the hood.
const _currencyFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
function formatCurrency(n) {
  const num = Number(n);
  if (!Number.isFinite(num) || num === 0) return '';
  return _currencyFmt.format(num);
}
function parseCurrency(str) {
  if (str == null) return null;
  const cleaned = String(str).replace(/[^0-9.\-]/g, '');
  if (!cleaned) return null;
  const n = parseInt(cleaned, 10);
  return Number.isFinite(n) ? n : null;
}
// Wires up an input element so it shows formatted currency on blur and
// raw digits while the user is typing. Call after render() — it's a no-op
// on missing elements so it's safe to call defensively.
function bindCurrencyInput(id) {
  const el = document.getElementById(id);
  if (!el || el._currencyBound) return;
  el._currencyBound = true;
  const reformat = () => {
    const n = parseCurrency(el.value);
    el.value = n != null ? formatCurrency(n) : '';
  };
  const strip = () => {
    const n = parseCurrency(el.value);
    el.value = n != null ? String(n) : '';
  };
  el.addEventListener('focus', strip);
  el.addEventListener('blur', reformat);
  // initial format (in case the value was set via template)
  if (el.value && document.activeElement !== el) reformat();
}

// ── RESUME FILE UPLOAD  ────────────────────────────────────────────────
// Client picks a file → we extract the text (PDF via pdf.js, DOCX via
// mammoth.js, plain text direct) and pipe it into the summary textarea
// so the AI has something to analyze. The file itself isn't stored anywhere —
// only the extracted text + the original filename live in the Sheet.
async function handleResumeFilePick(evt) {
  const file = evt.target?.files?.[0];
  if (!file) return;
  const summaryEl  = document.getElementById('resume-summary');
  const fileNameEl = document.getElementById('resume-filename');
  if (fileNameEl) fileNameEl.value = file.name;

  const ext = (file.name.split('.').pop() || '').toLowerCase();
  const MAX_CHARS = 30000; // leave headroom under the 50k Sheets cell limit

  try {
    showToast('Reading ' + file.name + '…');
    let text = '';

    if (ext === 'pdf' || file.type === 'application/pdf') {
      text = await extractPdfText(file);
    } else if (ext === 'docx' || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
      text = await extractDocxText(file);
    } else if (ext === 'doc') {
      showToast('.doc files are not supported — please save as .docx or PDF', 'red');
      return;
    } else {
      // treat as plain text (.txt, .md, or unknown)
      text = await file.text();
    }

    text = (text || '').replace(/\s+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
    if (!text) {
      showToast('Couldn\'t extract text — paste a summary manually', 'red');
      return;
    }
    if (text.length > MAX_CHARS) text = text.slice(0, MAX_CHARS) + '\n\n[…truncated]';

    if (summaryEl) {
      summaryEl.value = text;
      summaryEl.dispatchEvent(new Event('input', { bubbles: true }));
    }
    showToast('✓ Resume text extracted — review, then click Save');
  } catch (e) {
    console.error('[resume upload]', e);
    showToast('Couldn\'t read that file — paste a summary manually', 'red');
  }
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error('PDF reader not loaded');
  const buf = await file.arrayBuffer();
  const doc = await window.pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= doc.numPages; i++) {
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    pages.push(content.items.map(it => it.str).join(' '));
  }
  return pages.join('\n\n');
}

async function extractDocxText(file) {
  if (!window.mammoth) throw new Error('DOCX reader not loaded');
  const buf = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
  return result.value || '';
}

// ── ⑨ VOICE COACH — drill library, frameworks, skill axes  ────────────
// Inspired by the Parlor teleprompter pattern: a drill picker, then a
// focused recording session with a live transcript + framework checklist,
// then an LLM-powered review screen.

const DRILLS = [
  { id:'tellme',    category:'Behavioral · STAR',    title:'Tell me about yourself.',                                                        tags:['Opening','Narrative','Hook'],          difficulty:1, duration:'90s' },
  { id:'conflict',  category:'Behavioral · STAR',    title:'Tell me about a time you disagreed with your manager.',                          tags:['Conflict','Influence','Judgment'],     difficulty:2, duration:'2 min' },
  { id:'failure',   category:'Behavioral · STAR',    title:'Walk me through your biggest professional failure.',                             tags:['Ownership','Learning','Humility'],     difficulty:3, duration:'2 min' },
  { id:'project',   category:'Behavioral · STAR',    title:'Walk me through a project you led end-to-end.',                                  tags:['Leadership','Execution','Outcomes'],   difficulty:2, duration:'2 min' },
  { id:'why',       category:'Behavioral · Core',    title:'Why this company, why this role, why now?',                                      tags:['Motivation','Specificity','Research'], difficulty:1, duration:'60s' },
  { id:'ambiguity', category:'Case · Problem-solving', title:'A critical metric just dropped 30%. Walk me through your first hour.',         tags:['Prioritization','Hypothesis','Action'],difficulty:3, duration:'3 min' },
  { id:'pitch',     category:'Executive presence',   title:'Pitch yourself in 90 seconds to a skeptical founder.',                           tags:['Narrative','Hook','Pace'],             difficulty:3, duration:'90s' },
  { id:'salary',    category:'Negotiation',          title:'"Our budget tops out at $130K base. Is that workable?" — respond.',               tags:['Anchoring','Total comp','Poise'],      difficulty:2, duration:'60s' },
  { id:'deflect',   category:'Negotiation',          title:'"Before I share numbers, can you tell me your salary expectations?" — respond.',  tags:['Deflection','Ranges','Poise'],         difficulty:2, duration:'45s' },
];

// For each framework, `steps` drives the auto-advancing sidebar checklist
// during a live take. `beats` are elapsed-second thresholds at which the
// next step activates — roughly proportional to duration.
const FRAMEWORKS = {
  STAR: {
    label: 'STAR',
    expand: 'Situation · Task · Action · Result',
    useFor: ['conflict','failure','project','tellme'],
    steps: [
      { name:'Situation', hint:'Set the scene — who, when, stakes.' },
      { name:'Task',      hint:'What you specifically owned.' },
      { name:'Action',    hint:'Your decision + move. Use "I", not "we".' },
      { name:'Result',    hint:'Metric. Outcome. What you learned.' },
    ],
    beats: [0, 20, 40, 75],
  },
  SCQA: {
    label: 'SCQA',
    expand: 'Situation · Complication · Question · Answer',
    useFor: ['pitch','why'],
    steps: [
      { name:'Situation',    hint:'Context the listener already knows.' },
      { name:'Complication', hint:'The tension or shift that matters.' },
      { name:'Question',     hint:'The question this raises.' },
      { name:'Answer',       hint:'Your crisp, confident answer.' },
    ],
    beats: [0, 15, 30, 45],
  },
  PREP: {
    label: 'P·R·E·P',
    expand: 'Point · Reason · Example · Point',
    useFor: ['salary','deflect'],
    steps: [
      { name:'Point',   hint:'Your anchor — what you\'re asking for.' },
      { name:'Reason',  hint:'Why — market, scope, value.' },
      { name:'Example', hint:'Evidence — a specific case or number.' },
      { name:'Point',   hint:'Restate clearly. Then stay silent.' },
    ],
    beats: [0, 12, 24, 40],
  },
  HYPOTHESIS: {
    label: 'Hypothesis-first',
    expand: 'Hypothesis · Framework · Evidence · Recommendation',
    useFor: ['ambiguity'],
    steps: [
      { name:'Hypothesis',    hint:'Your best guess at the cause.' },
      { name:'Framework',     hint:'How you\'ll structure the investigation.' },
      { name:'Evidence',      hint:'Data you\'d pull to confirm or reject.' },
      { name:'Recommendation',hint:'What you\'d do next — be specific.' },
    ],
    beats: [0, 25, 55, 90],
  },
};

// Given a drill, return the best-matching framework
function frameworkFor(drill) {
  const id = drill?.id;
  for (const fw of Object.values(FRAMEWORKS)) {
    if (fw.useFor.includes(id)) return fw;
  }
  return FRAMEWORKS.STAR;
}

function findDrill(id) { return DRILLS.find(d => d.id === id); }

const VoiceEngine = {
  recognition: null, speaking: false,
  init() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR && !this.recognition) {
      this.recognition = new SR();
      this.recognition.continuous = false;
      this.recognition.interimResults = true;
      this.recognition.lang = 'en-US';
    }
  },
  speak(text, onend) {
    if (!('speechSynthesis' in window)) { onend?.(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.08;   // +8% — slightly brisker, feels more natural/conversational
    u.pitch = 1.0;
    u.volume = 1.0;
    u.voice = pickBestVoice();
    u.onend = () => { this.speaking = false; onend?.(); };
    u.onerror = () => { this.speaking = false; onend?.(); };
    this.speaking = true;
    window.speechSynthesis.speak(u);
  },
  listen(onResult, onStatus) {
    this.init();
    if (!this.recognition) { onStatus?.('Speech recognition not supported. Try Chrome or Edge.'); return; }
    let final = '';
    this.recognition.continuous = false;
    this.recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal ? (final += e.results[i][0].transcript) : (interim += e.results[i][0].transcript);
      }
      onStatus?.((final + interim).trim() || 'Listening…');
    };
    this.recognition.onend = () => onResult(final.trim());
    this.recognition.onerror = (e) => { onStatus?.('Error: ' + e.error); onResult(final.trim()); };
    try { this.recognition.start(); onStatus?.('🔴 Listening… tap mic again to stop'); }
    catch(e) { onStatus?.('Allow microphone access and try again.'); }
  },
  // Streaming variant used by the teleprompter — fires on every interim
  // result so the live caption can update in real time. Stays listening
  // until stopStream() is called. Auto-restarts on end() so long answers
  // that pause mid-sentence don't kill the recognition.
  streamListen(onUpdate) {
    this.init();
    if (!this.recognition) return null;
    let full = '';
    let shouldRestart = true;
    this.recognition.continuous = true;
    this.recognition.interimResults = true;
    this.recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) full += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      onUpdate?.({ final: full.trim(), interim: interim.trim(), combined: (full + interim).trim() });
    };
    this.recognition.onend = () => {
      // Browsers sometimes auto-end after a pause — restart unless caller stopped us
      if (shouldRestart) { try { this.recognition.start(); } catch (_) {} }
    };
    this.recognition.onerror = () => { /* swallow — onend will restart */ };
    try { this.recognition.start(); } catch (_) {}
    return {
      stop: () => {
        shouldRestart = false;
        try { this.recognition?.stop(); } catch (_) {}
        return full.trim();
      },
    };
  },
  stop() { try { this.recognition?.stop(); } catch(e) {} },
};

// ── Voice Coach state + timer engine ────────────────────────────────
// state.voice = { phase, drillId, takeNo, seconds, transcript, streamHandle, analysis }
//   phase: 'pick' | 'ready' | 'countdown' | 'live' | 'analyzing' | 'review'
function voiceState() {
  return (state.voice ||= { phase:'pick', drillId:null, takeNo:1, seconds:0, transcript:'', review:null });
}

let _voiceTimerId = null;
let _voiceStream = null;

// Kicks the countdown → live transition. Uses setInterval for the ticking
// clock + per-second DOM updates to avoid full re-renders (which would
// interrupt the live transcript animation and focus).
function voiceBeginTake() {
  const v = voiceState();
  v.phase = 'countdown';
  v.seconds = 3;
  v.transcript = '';
  render();

  // Countdown 3 → 2 → 1 → GO, then flip to live
  const countdownEl = () => document.getElementById('voice-countdown');
  const countdownTick = () => {
    if (v.seconds <= 0) {
      clearInterval(_voiceTimerId);
      v.phase = 'live';
      v.seconds = 0;
      render();
      startLiveTimer();
      startLiveTranscript();
      return;
    }
    const el = countdownEl();
    if (el) el.textContent = v.seconds;
    v.seconds -= 1;
  };
  countdownTick();
  _voiceTimerId = setInterval(countdownTick, 700);
}

function startLiveTimer() {
  const v = voiceState();
  v.seconds = 0;
  if (_voiceTimerId) clearInterval(_voiceTimerId);
  _voiceTimerId = setInterval(() => {
    v.seconds += 1;
    updateVoiceLiveDOM();
  }, 1000);
}

function startLiveTranscript() {
  const v = voiceState();
  _voiceStream = VoiceEngine.streamListen((update) => {
    v.transcript = update.combined || '';
    const el = document.getElementById('voice-transcript');
    if (el) {
      // Distinguish final from interim with subtle opacity
      const esc = (s) => s.replace(/</g,'&lt;');
      el.innerHTML = esc(update.final) + (update.interim
        ? ` <span style="opacity:.55">${esc(update.interim)}</span>`
        : '') + (v.phase === 'live' ? '<span style="opacity:.5">▎</span>' : '');
      el.scrollTop = el.scrollHeight;
    }
  });
}

// Called on every second-tick while live. Updates timer + STAR active step
// + coach cue directly without re-rendering the whole card (which would
// break the streaming SpeechRecognition attached to the DOM state).
function updateVoiceLiveDOM() {
  const v = voiceState();
  const s = v.seconds;
  const mm = String(Math.floor(s / 60)).padStart(2,'0');
  const ss = String(s % 60).padStart(2,'0');
  const t = document.getElementById('voice-timer');
  if (t) t.textContent = `${mm}:${ss}`;

  const drill = findDrill(v.drillId);
  const fw = frameworkFor(drill);
  fw.steps.forEach((step, i) => {
    const beat = fw.beats[i];
    const nextBeat = fw.beats[i+1] ?? 9999;
    const active = s >= beat && s < nextBeat;
    const done   = s >= nextBeat;
    const row = document.querySelector(`[data-fw-step="${i}"]`);
    if (!row) return;
    row.dataset.state = done ? 'done' : active ? 'active' : 'pending';
  });
}

async function voiceEndTake() {
  const v = voiceState();
  if (_voiceTimerId) { clearInterval(_voiceTimerId); _voiceTimerId = null; }
  const finalText = _voiceStream ? _voiceStream.stop() : v.transcript;
  _voiceStream = null;
  v.transcript = finalText || v.transcript || '';
  const elapsed = v.seconds;
  v.phase = 'analyzing';
  render();

  const drill = findDrill(v.drillId) || { id:'?', title:'?' };
  try {
    const resp = await scriptCall({
      action: 'analyze_interview_answer',
      email: viewedEmail(),
      drill,
      transcript: v.transcript,
      seconds: elapsed,
    });
    if (resp.configured && resp.review) {
      v.review = resp.review;
    } else {
      v.review = mockInterviewReview(drill, v.transcript, elapsed);
      if (!resp.configured) showToast('Using sample review — set ANTHROPIC_API_KEY for real Claude feedback', 'red');
    }
  } catch (e) {
    console.error(e);
    v.review = mockInterviewReview(drill, v.transcript, elapsed);
    showToast('Analysis failed, showing sample — ' + (e.message || ''), 'red');
  }
  v.phase = 'review';
  render();
}

// Simple mock review for when Claude isn't available. Good enough to drive
// the UI; real output is dramatically better when the key is in place.
function mockInterviewReview(drill, transcript, seconds) {
  const t = (transcript || '').trim();
  const words = t.split(/\s+/).filter(Boolean).length;
  const fillerCount = (t.match(/\b(um|uh|like|you know|so,? |basically|literally)\b/gi) || []).length;
  const sentences = t.split(/[.!?]+\s/).filter(s => s.trim().length > 4);
  const flags = sentences.slice(0, 5).map(s => {
    const lower = s.toLowerCase();
    if (/\d+\s*%|\d{3,}|\$|reduced|saved|grew|increased/.test(lower)) return { text: s.trim(), flag: 'metric', note: 'Concrete number — strong anchor.' };
    if (/(um|uh|you know|basically|literally|like,)/.test(lower)) return { text: s.trim(), flag: 'filler', note: 'Filler language — cut it.' };
    if (/\bwe\b/.test(lower) && !/\bi\b/.test(lower)) return { text: s.trim(), flag: 'weak', note: 'Says "we" without "I" — your contribution disappears.' };
    if (/(i led|i decided|i ran|i proposed|i built)/i.test(s)) return { text: s.trim(), flag: 'specific', note: 'Clear ownership — good.' };
    return { text: s.trim(), flag: 'neutral', note: '' };
  });
  let score = 60 + Math.min(25, words / 8) - fillerCount * 2;
  if (flags.some(f => f.flag === 'metric')) score += 6;
  score = Math.max(35, Math.min(95, Math.round(score)));
  return {
    score,
    verdict: words < 20
      ? 'Too brief — I need to hear the situation, your action, and the number that changed.'
      : fillerCount > 4
      ? `Strong bones, but ${fillerCount} fillers pulled me out of the story. Tighten the opening.`
      : 'Solid structure. Sharpen the close with one specific outcome and you\'re there.',
    xp: Math.max(40, Math.round(score * 1.4)),
    stats: {
      words, durationSec: seconds, wpm: seconds > 0 ? Math.round(words / (seconds/60)) : 0, fillerCount,
    },
    lines: flags,
    nextDrills: ['Run the same prompt again, land the final number first.', 'Try the "Biggest failure" drill for variety.', 'Do a 30-second pace drill to match your speaking tempo to target.'],
  };
}

function voiceRetake() {
  const v = voiceState();
  v.takeNo = (v.takeNo || 1) + 1;
  v.phase = 'ready';
  v.seconds = 0;
  v.transcript = '';
  v.review = null;
  render();
}

function voiceBackToDrills() {
  if (_voiceTimerId) { clearInterval(_voiceTimerId); _voiceTimerId = null; }
  if (_voiceStream) { try { _voiceStream.stop(); } catch(_) {} _voiceStream = null; }
  window.speechSynthesis?.cancel();
  state.voice = { phase:'pick', drillId:null, takeNo:1, seconds:0, transcript:'', review:null };
  render();
}

function render() {
  document.getElementById('app').innerHTML = buildPage();
  bindEvents();
  bindCurrencyInput('q-salaryFloor');
  // If the swipe deck is open, attach pointer-drag listeners to the top card.
  // No-op when the deck isn't active.
  wireSwipeGestures();
}

function buildPage() {
  if (!SETUP_COMPLETE) return renderSetupWizard();
  switch (state.page) {
    case 'login':    return renderLogin();
    case 'register': return renderRegister();
    case 'client':   return renderHeader() + `<main class="max-w-6xl mx-auto px-4 py-8">${renderClientTabs()}</main>` + renderFooter() + renderSwipeDeck();
    case 'coach':    return renderHeader() + `<main class="max-w-7xl mx-auto px-4 py-8">${renderCoach()}</main>` + renderFooter() + renderSwipeDeck();
    case 'loading':  return renderLoadingScreen(state.loadingMsg);
    case 'error':    return `<div class="min-h-screen flex items-center justify-center p-8"><div class="card p-8 max-w-md text-center"><div class="text-4xl mb-3">⚠️</div><h2 class="font-bold text-gray-900">Something went wrong</h2><p class="text-sm text-gray-600 mt-2">${state.errorMsg || 'Unknown error'}</p><button onclick="location.reload()" class="btn btn-primary mt-4">Reload</button></div></div>`;

  }
}

// ── GET STARTED (assessment + intake merged)  ─────────────────────────
// Two-phase progressive flow:
//   1. Big Five assessment (or skip straight to Phase 2 if already done)
//   2. Practical profile form, pre-filled with inferences from the assessment
// Once saved, the combined analysis runs and the user lands on My Profile.
function renderIntake(c) {
  const q = c.questionnaire || {};
  const asmt = bigFiveState();
  const quizActive = asmt._started || Object.keys(asmt.answers).length > 0;
  const hasScores = !!q.bigFive;

  // Phase 1: take the assessment (either first-time or a retake)
  if (!hasScores || quizActive) return renderIntakePhaseAssessment(c);
  // Phase 2: pre-filled practical fields
  return renderIntakePhaseProfile(c);
}

function renderIntakePhaseAssessment(c) {
  const asmt = bigFiveState();
  const answered = Object.keys(asmt.answers).length;
  const hasStarted = asmt._started || answered > 0;
  const isRetake = !!c.questionnaire?.bigFive;

  // Intro screen
  if (!hasStarted) {
    return `
    <div class="max-w-2xl mx-auto">
      <div class="card p-8 text-center">
        <div class="text-4xl mb-3">🧭</div>
        <h2 class="font-headline text-3xl font-bold mb-2">${isRetake ? 'Retake the' : 'Welcome! Let\'s start with your'} work-style assessment</h2>
        <p class="text-gray-600 mb-6 max-w-md mx-auto">25 quick questions across five dimensions. We'll use your answers to pre-fill your profile and recommend roles that fit how you actually work. Takes about 4 minutes. ⏱</p>
        <div class="flex flex-wrap gap-2 justify-center mb-6 text-xs">
          ${Object.entries(TRAIT_META).map(([k,m]) => `
            <div class="px-3 py-2 rounded-lg bg-white border border-gray-200 whitespace-nowrap">
              <div class="font-headline font-bold text-indigo-700">${m.name}</div>
            </div>`).join('')}
        </div>
        <button data-action="start-assessment" class="btn btn-primary">${isRetake ? 'Start over →' : 'Begin →'}</button>
        <p class="text-xs text-gray-400 mt-4">Based on the Big Five (IPIP) framework — scientifically validated across decades of research.</p>
      </div>
    </div>`;
  }

  // Quiz in progress — one question at a time
  const total = BIG_FIVE_QUESTIONS.length;
  const idx = Math.min(asmt.idx, total - 1);
  const q = BIG_FIVE_QUESTIONS[idx];
  const pickedVal = asmt.answers[q.id];
  const pct = Math.round(((idx) / total) * 100);
  const allAnswered = answered === total;

  return `
  <div class="max-w-2xl mx-auto">
    <div class="card p-6">
      <div class="flex items-center justify-between text-xs text-gray-500 mb-2">
        <span>Question ${idx + 1} of ${total}</span>
        <span>${answered} answered</span>
      </div>
      <div class="progress-bar mb-6"><div class="progress-fill" style="width:${pct}%"></div></div>

      <div class="text-xs uppercase tracking-wide font-semibold text-[#4f46e5] mb-2">${TRAIT_META[q.trait].name}</div>
      <h2 class="font-headline text-2xl leading-snug mb-6">${q.text}</h2>

      <div class="space-y-2">
        ${LIKERT_OPTIONS.map(opt => `
          <button data-action="answer-question" data-question="${q.id}" data-value="${opt.v}"
            class="w-full text-left px-4 py-3 rounded-xl border transition ${pickedVal === opt.v ? 'bg-[#eef2ff] border-[#4f46e5] text-[#3730a3] font-semibold' : 'bg-white border-gray-200 hover:border-[#4f46e5]'}">
            ${opt.label}
          </button>`).join('')}
      </div>

      <div class="flex items-center justify-between mt-6">
        <button data-action="prev-question" class="btn btn-secondary ${idx === 0 ? 'opacity-40 pointer-events-none' : ''}">← Back</button>
        ${idx < total - 1
          ? `<button data-action="next-question" class="btn btn-primary ${pickedVal ? '' : 'opacity-40 pointer-events-none'}">Next →</button>`
          : `<button data-action="submit-assessment" class="btn btn-primary ${allAnswered ? '' : 'opacity-40 pointer-events-none'}">Continue to profile →</button>`
        }
      </div>
    </div>
  </div>`;
}

  const workStyle  = q.workStyle  || inferred.workStyle;

        <div>

// ── BIG FIVE ASSESSMENT  ──────────────────────────────────────────────
// 25 IPIP-style questions (5 per trait) framed for a work context. Scoring
// is per trait on a 0-100 scale: average the Likert responses (1-5), flip
// reverse-coded items, then linearly map to 0-100.
//
// Traits:
//   O = Openness to experience     (curiosity, creativity)
//   C = Conscientiousness          (discipline, organization)
//   E = Extraversion               (energy from others, assertiveness)
//   A = Agreeableness              (warmth, cooperation)
//   N = Neuroticism                (emotional reactivity — inverted in UX)

const BIG_FIVE_QUESTIONS = [
  // Openness
  { id:'o1', trait:'O', text:'I enjoy exploring unfamiliar ideas at work.',            reverse:false },
  { id:'o2', trait:'O', text:'I prefer routine tasks over novel ones.',                reverse:true  },
  { id:'o3', trait:'O', text:'I come up with creative solutions to problems.',         reverse:false },
  { id:'o4', trait:'O', text:'I don\'t enjoy experimenting with new methods.',         reverse:true  },
  { id:'o5', trait:'O', text:'I\'m drawn to work that challenges my assumptions.',     reverse:false },
  // Conscientiousness
  { id:'c1', trait:'C', text:'I follow through on commitments without being reminded.',reverse:false },
  { id:'c2', trait:'C', text:'I often leave tasks unfinished.',                        reverse:true  },
  { id:'c3', trait:'C', text:'I pay close attention to details in my work.',           reverse:false },
  { id:'c4', trait:'C', text:'My workspace tends to be cluttered or disorganized.',    reverse:true  },
  { id:'c5', trait:'C', text:'I plan ahead before starting a project.',                reverse:false },
  // Extraversion
  { id:'e1', trait:'E', text:'I feel energized by group discussions.',                 reverse:false },
  { id:'e2', trait:'E', text:'I prefer working alone over collaborating in groups.',   reverse:true  },
  { id:'e3', trait:'E', text:'I speak up easily in meetings.',                         reverse:false },
  { id:'e4', trait:'E', text:'I stay quiet unless directly asked.',                    reverse:true  },
  { id:'e5', trait:'E', text:'I enjoy meeting new colleagues and building networks.',  reverse:false },
  // Agreeableness
  { id:'a1', trait:'A', text:'I take time to understand other people\'s perspectives.',reverse:false },
  { id:'a2', trait:'A', text:'I find it hard to care about other people\'s problems.', reverse:true  },
  { id:'a3', trait:'A', text:'I seek win-win outcomes in disagreements.',              reverse:false },
  { id:'a4', trait:'A', text:'I enjoy debate and direct disagreement.',                reverse:true  },

  O: { name:'Openness',            high:'Exploratory & curious',       low:'Pragmatic & conventional',   desc:'Drawn to novel ideas vs. tried-and-true approaches.' },
  C: { name:'Conscientiousness',   high:'Organized & disciplined',     low:'Flexible & improvisational', desc:'Planful and precise vs. adaptive and spontaneous.' },

  A: { name:'Agreeableness',       high:'Collaborative & warm',        low:'Direct & candid',            desc:'How you approach conflict and cooperation.' },
  N: { name:'Emotional Stability', high:'Steady under pressure',       low:'Sensitive to stress',        desc:'How you respond to workplace stressors. (Higher = more steady — we flip this from clinical Neuroticism scoring.)' },
};

// Maps Big Five scores to reasonable defaults for the practical-profile
// questionnaire fields. Used to pre-fill the Get Started "finish your profile"
// form after the assessment completes, so users don't start from a blank
// page. Users can edit any of these before saving.
function inferFromBigFive(scores) {
  const s = scores || {};
  const out = { workStyle: '', strengths: [], energizers: '', drainers: '' };

  if (s.E >= 60 && s.C >= 60)       out.workStyle = 'fast-paced';
  else if (s.E >= 60)                out.workStyle = 'collaborative';
  else if (s.C >= 60)                out.workStyle = 'structured';
  else if (s.E <= 40 && s.C <= 40)   out.workStyle = 'deep-focus';
  else                               out.workStyle = 'hybrid';

  // Top-scoring traits surface as strengths phrasing
  const traitPhrases = [
    ['O', s.O, 'curious thinker, drawn to new ideas'],
    ['C', s.C, 'disciplined executor who follows through'],
    ['E', s.E, 'strong relationship-builder and communicator'],
    ['A', s.A, 'collaborative, seeks win-win outcomes'],
    ['N', s.N, 'steady under pressure'],
  ];
  out.strengths = traitPhrases
    .filter(([, score]) => score >= 55)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 4)
    .map(([, , phrase]) => phrase);

  if (s.E >= 60) {
    out.energizers = 'Group discussions, meeting new people, cross-functional collaboration';
    out.drainers   = 'Long solo work blocks, rigid processes, limited interaction';
  } else if (s.E <= 40) {
    out.energizers = 'Deep-focus work, one-on-one conversations, solving complex problems';
    out.drainers   = 'Back-to-back meetings, group brainstorming, constant context-switching';
  } else {
    out.energizers = 'A mix of collaborative and focused work';
    out.drainers   = 'Extremes in either direction';
  }

  return out;
}

// Takes { questionId: 1..5 } and produces { O: 0..100, C: ..., E: ..., A: ..., N: ... }.
// For Emotional Stability we invert the raw Neuroticism score so "higher = more stable."
function scoreBigFive(answers) {
  const totals = { O:0, C:0, E:0, A:0, N:0 };
  const counts = { O:0, C:0, E:0, A:0, N:0 };
  BIG_FIVE_QUESTIONS.forEach(q => {
    const raw = answers[q.id];
    if (!raw) return;
    const val = q.reverse ? (6 - raw) : raw; // flip 1→5, 2→4, etc.
    totals[q.trait] += val;
    counts[q.trait] += 1;
  });
  const scale = trait => {
    if (!counts[trait]) return 0;
    const avg = totals[trait] / counts[trait]; // 1..5
    return Math.round(((avg - 1) / 4) * 100);  // → 0..100
  };
  const raw = { O: scale('O'), C: scale('C'), E: scale('E'), A: scale('A'), N: scale('N') };
  // Flip N so "higher = more emotionally stable" in display/LLM prompt
  raw.N = 100 - raw.N;
  return raw;
}

function renderSwipeDeck() {
  const d = state.swipeDeck;
  if (!d?.active) return '';
  const job = d.jobs[d.idx];
  const remaining = d.jobs.length - d.idx;

  if (!job) {
    // All cards processed — finalize outside of render via rAF
    requestAnimationFrame(() => finalizeSwipeDeck());
    return `

      <div class="text-white text-center">
        <div class="text-4xl mb-3">✨</div>
        <div class="font-headline text-2xl">All done — saving…</div>

  const stackHtml = stack.map((j, i) => {

// Called after render() when the swipe deck is active, to attach gesture
// listeners to the top card. Listeners are replaced on every render
// (which happens on each swipe), so we don't stack handlers.
function wireSwipeGestures() {
  const d = state.swipeDeck;
  if (!d?.active) return;
  const topCard = document.querySelector('[data-swipe-card="0"]');
  if (!topCard) return;

  let startX = 0, startY = 0, dragging = false, pointerId = null;
  const likeStamp = topCard.querySelector('.swipe-stamp.like');
  const nopeStamp = topCard.querySelector('.swipe-stamp.nope');

  topCard.addEventListener('pointerdown', (e) => {
    // Let clicks on links/buttons pass through normally — otherwise the
    // "View posting" anchor can never fire because we capture the pointer.
    if (e.target.closest('a, button, input, select, textarea')) return;
    dragging = true; startX = e.clientX; startY = e.clientY; pointerId = e.pointerId;
    topCard.setPointerCapture(e.pointerId);
    topCard.classList.remove('rest'); topCard.classList.add('drag');
  });

  topCard.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const rot = dx / 20; // ~15° at 300px
    topCard.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    if (likeStamp) likeStamp.style.opacity = Math.max(0, Math.min(1, dx / 120));
    if (nopeStamp) nopeStamp.style.opacity = Math.max(0, Math.min(1, -dx / 120));
  });

  const endDrag = (e) => {
    if (!dragging) return;
    dragging = false;
    try { topCard.releasePointerCapture(pointerId); } catch (_) {}
    topCard.classList.remove('drag'); topCard.classList.add('rest');
    const dx = e.clientX - startX;
    if (dx > 120)      commitSwipe('yes');
    else if (dx < -120) commitSwipe('no');
    else {
      // Snap back
      topCard.style.transform = '';
      if (likeStamp) likeStamp.style.opacity = '0';
      if (nopeStamp) nopeStamp.style.opacity = '0';
    }
  };
  topCard.addEventListener('pointerup', endDrag);
  topCard.addEventListener('pointercancel', endDrag);
}

// Wrapper so both drag-release and button clicks funnel through the same path
function commitSwipe(direction) {
  const d = state.swipeDeck;
  if (!d?.active) return;
  const topCard = document.querySelector('[data-swipe-card="0"]');
  const job = d.jobs[d.idx];
  if (!job) return;

  // Animate the card off-screen, then advance state and re-render
  if (topCard) {
    topCard.classList.add(direction === 'yes' ? 'gone-right' : 'gone-left');
  }
  if (direction === 'yes') d.liked.push(job);
  d.idx += 1;
  // Let the exit animation breathe for ~200ms before re-rendering the stack
  setTimeout(() => render(), 200);
}

async function finalizeSwipeDeck() {
  const d = state.swipeDeck;
  if (!d) return;
  const toSave = d.liked.slice();
  const total = d.jobs.length;
  state.swipeDeck = null;
  if (toSave.length > 0) {
    await addJobs(toSave);
    showToast(`Saved ${toSave.length} of ${total} · dismissed ${total - toSave.length}`);
  } else {
    render();
    showToast('Closed — no jobs saved');
  }
}

// Keyboard: ← dismiss, → save, Esc exit — only active while the deck is open.
function onSwipeKeyDown(e) {
  const d = state.swipeDeck;
  if (!d?.active) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); commitSwipe('yes'); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); commitSwipe('no'); }
  else if (e.key === 'Escape') { e.preventDefault(); finalizeSwipeDeck(); }
}
if (typeof window !== 'undefined') window.addEventListener('keydown', onSwipeKeyDown);

// Stable signature for deduping a job across searches. Each fresh search
// generates new random IDs, so we can't use job.id — we fall back to the
// URL (unique per posting) or a normalized title+company+location hash.
function jobSignature(j) {
  if (j?.url) return ('u:' + j.url).trim().toLowerCase();
  return ('t:' + (j?.title || '') + '|' + (j?.company || '') + '|' + (j?.location || '')).trim().toLowerCase();
}

// Cheap keyword-overlap baseline so cards never say 0% when the LLM is
// unavailable or hasn't enriched yet. Gets replaced by the LLM-scored value
// as soon as enrich_jobs returns.
function keywordMatchScore(job, questionnaire) {
  const q = questionnaire || {};
  const haystack = ((job.title || '') + ' ' + (job.company || '') + ' ' + (job.extra?.description || '') + ' ' + (job.extra?.company?.industry || '')).toLowerCase();
  let score = 55; // floor — JSearch already prefiltered to the client's role query
  const needles = [
    q.roleTarget,
    ...(q.strengths || []),
    ...(q.industries || []),
  ].filter(Boolean).flatMap(s => String(s).toLowerCase().split(/\s+/).filter(w => w.length > 3));
  const hits = new Set();
  needles.forEach(w => { if (haystack.includes(w)) hits.add(w); });
  // Each unique hit nudges the score up to a sensible ceiling for keyword matching
  score += Math.min(32, hits.size * 4);
  // Location preference alignment
  if (q.locationPref && job.location && job.location.toLowerCase().includes(String(q.locationPref).toLowerCase().split(/[,\s]/)[0])) {
    score += 4;
  }
  return Math.max(40, Math.min(92, score));
}

// Clearbit's free logo endpoint. Falls back to a solid initial tile if the
// lookup 404s (which happens often for small/newer companies).
function companyLogo(job) {
  const website = job.extra?.website;
  const letter = (job.company || '?').charAt(0).toUpperCase();
  if (!website) {
    return `<div class="w-12 h-12 rounded-xl brand-grad text-white flex items-center justify-center font-bold font-headline text-xl shrink-0">${letter}</div>`;
  }
  return `<img src="https://logo.clearbit.com/${website}" alt="${job.company} logo"
    class="w-12 h-12 rounded-xl object-contain bg-white border border-[#e5e7eb] shrink-0"
    onerror="this.outerHTML='<div class=\\'w-12 h-12 rounded-xl brand-grad text-white flex items-center justify-center font-bold font-headline text-xl shrink-0\\'>${letter}</div>'" />`;
}

}

function renderVoice() {
  const v = voiceState();
  const supported = ('speechSynthesis' in window) && (('webkitSpeechRecognition' in window)||('SpeechRecognition' in window));
  if (!supported) {
    return `<div class="card p-6 max-w-2xl mx-auto">
      <div class="p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-900">
        ⚠️ Open this page in <b>Chrome</b> or <b>Edge</b> for voice features, and allow microphone access when prompted.
      </div></div>`;
  }
  if (v.phase === 'pick' || !v.drillId) return renderVoiceDrillPicker();
  if (v.phase === 'analyzing') return renderVoiceAnalyzing();
  if (v.phase === 'review') return renderVoiceReview();
  return renderVoiceTeleprompter();
}

}

function renderVoiceTeleprompter() {
  const v = voiceState();
  const drill = findDrill(v.drillId);
  const fw = frameworkFor(drill);
  const phase = v.phase;
  const mm = String(Math.floor(v.seconds / 60)).padStart(2,'0');
  const ss = String(v.seconds % 60).padStart(2,'0');

  return `
  <div class="max-w-6xl mx-auto">
    <!-- Top bar -->
    <div class="flex items-center justify-between mb-5 gap-3 flex-wrap">
      <div class="flex items-center gap-4">
        <button data-action="voice-back" class="text-sm text-gray-500 hover:text-gray-900">← Exit</button>
        <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold">Session · Take ${v.takeNo || 1}</div>
      </div>
      <div class="flex items-center gap-3">
        ${phase === 'live' ? `<span class="inline-flex items-center gap-1.5 text-xs text-red-600 font-semibold"><span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>LIVE</span>` : ''}
        <span id="voice-timer" class="font-mono text-sm text-gray-700" style="font-variant-numeric:tabular-nums;letter-spacing:.08em">${mm}:${ss}</span>
      </div>
    </div>

    <div class="grid lg:grid-cols-3 gap-6">
      <!-- Prompt + live transcript (takes 2 cols) -->
      <div class="lg:col-span-2">
        <!-- Dark teleprompter card -->
        <div class="rounded-2xl p-8 relative" style="background:linear-gradient(160deg,#1e1b4b 0%,#312e81 50%,#3730a3 100%); min-height:360px;">
          <div class="text-xs uppercase tracking-widest text-white/50 font-semibold mb-3">
            ${drill.category}
          </div>
          <h1 class="font-headline text-white leading-tight" style="font-size:clamp(22px,3vw,34px)">${drill.title}</h1>

          <div class="mt-6 pt-5 border-t border-white/10 text-sm text-white/80 leading-relaxed font-mono" id="voice-transcript" style="min-height:100px; max-height:220px; overflow-y:auto;">
            ${phase === 'ready' ? '<span style="opacity:.5">▎ Press <b>Start take</b> — your words will stream here as you speak.</span>' : ''}
            ${phase === 'countdown' ? `<div class="flex items-center justify-center w-full py-8"><div id="voice-countdown" class="font-headline text-white" style="font-size:88px;line-height:1;">${v.seconds || 'GO'}</div></div>` : ''}
            ${phase === 'live' && !v.transcript ? '<span style="opacity:.5">▎ Listening…</span>' : ''}
          </div>

          <!-- HUD: take number, target duration -->
          <div class="absolute top-5 right-6 flex items-center gap-3 text-xs text-white/60 font-mono">
            <span>Target ${drill.duration}</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center gap-3 mt-5">
          ${phase === 'ready' ? `
            <button data-action="voice-begin-take" class="btn btn-primary inline-flex items-center gap-2 px-6">
              🎤 Start take
            </button>
            <button data-action="voice-speak-prompt" class="btn btn-secondary text-sm">🔊 Hear the prompt</button>
          ` : ''}
          ${phase === 'countdown' ? `
            <button data-action="voice-end-take" class="btn btn-secondary text-sm">Cancel</button>
          ` : ''}
          ${phase === 'live' ? `
            <button data-action="voice-end-take" class="btn btn-primary inline-flex items-center gap-2 px-6" style="background:#dc2626">
              ⏹ End take
            </button>
          ` : ''}
          <button data-action="voice-back" class="btn btn-ghost text-sm ml-auto">← All drills</button>
        </div>

        <div class="text-xs text-gray-500 mt-3">Tip: look straight ahead, not at the screen. Pause when you need to — it reads as confidence.</div>
      </div>

      <!-- Framework sidebar -->
      <div>
        <div class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-3">
          Framework · ${fw.label}
        </div>
        <div class="card p-0 divide-y divide-gray-100">
          ${fw.steps.map((step, i) => {
            const beat = fw.beats[i];
            const nextBeat = fw.beats[i+1] ?? 9999;
            const active = v.seconds >= beat && v.seconds < nextBeat && phase === 'live';
            const done   = v.seconds >= nextBeat && phase === 'live';
            const stateKey = done ? 'done' : active ? 'active' : 'pending';
            return `
            <div data-fw-step="${i}" data-state="${stateKey}" class="flex gap-3 p-4">
              <div class="shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold transition"
                style="border-color:${stateKey === 'done' ? '#10b981' : stateKey === 'active' ? '#4f46e5' : '#d1d5db'}; background:${stateKey === 'done' ? '#10b981' : stateKey === 'active' ? '#4f46e5' : 'transparent'}; color:${stateKey === 'pending' ? '#374151' : 'white'};">
                ${stateKey === 'done' ? '✓' : i+1}
              </div>
              <div class="flex-1">
                <div class="font-headline font-bold text-sm ${stateKey === 'pending' ? 'text-gray-600' : 'text-gray-900'}">${step.name}</div>
                <div class="text-xs text-gray-500 mt-0.5">${step.hint}</div>
              </div>
            </div>`;
          }).join('')}
        </div>

        <div class="mt-5 text-xs text-gray-500">
          <span class="font-semibold text-gray-700">${fw.label}</span> — ${fw.expand}
        </div>
      </div>
    </div>
  </div>`;
}

function renderVoiceReview() {
  const v = voiceState();
  const drill = findDrill(v.drillId);
  const r = v.review || {};
  const s = r.score || 0;
  const stats = r.stats || {};
  const lines = r.lines || [];
  const flagColor = (f) => {
    switch (f) {
      case 'metric':
      case 'specific':
      case 'good':     return { dot:'#10b981', label:'STRONG' };
      case 'filler':
      case 'weak':     return { dot:'#ef4444', label: (f === 'filler' ? 'FILLER' : 'WEAK') };
      case 'neutral':  return { dot:'#9ca3af', label:'NEUTRAL' };
      default:         return { dot:'#9ca3af', label: (f || '').toUpperCase() };
    }
  };

  return `
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <button data-action="voice-back" class="text-sm text-gray-500 hover:text-gray-900">← Back to drills</button>
      <div class="flex gap-2">
        <button data-action="voice-retake" class="btn btn-secondary text-sm">🔄 Retake</button>
        <button data-action="voice-back" class="btn btn-primary text-sm">✨ Pick another drill</button>
      </div>
    </div>

    <!-- Hero: score + verdict -->
    <div class="grid md:grid-cols-5 gap-6 mb-8 items-end">
      <div class="md:col-span-2">
        <div class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">Rep score</div>
        <div class="flex items-baseline gap-3">
          <div class="font-headline font-bold tracking-tight" style="font-size:112px;line-height:1;">${s}</div>
          <div class="text-lg text-gray-400">/ 100</div>
        </div>
        <div class="text-sm text-indigo-600 font-semibold mt-2">+${r.xp || 0} XP</div>
        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 mt-3">
          <span><b>${stats.words ?? 0}</b> words</span>
          <span><b>${Math.floor((stats.durationSec||0)/60)}:${String((stats.durationSec||0)%60).padStart(2,'0')}</b> length</span>
          <span><b>${stats.wpm ?? 0}</b> wpm</span>
          <span><b>${stats.fillerCount ?? 0}</b> fillers</span>
        </div>
      </div>
      <div class="md:col-span-3 card p-5" style="border-left:4px solid #4f46e5;">
        <div class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">Coach verdict</div>
        <div class="font-headline text-xl leading-snug text-gray-900">"${r.verdict || '—'}"</div>
      </div>
    </div>

    <!-- Line-by-line transcript -->
    ${lines.length ? `
      <div class="card p-6 mb-8">
        <div class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-3">Line-by-line</div>
        <div class="divide-y divide-gray-100">
          ${lines.map(ln => {
            const c = flagColor(ln.flag);
            return `
            <div class="py-4">
              <div class="text-gray-900 leading-relaxed">"${(ln.text || '').replace(/</g,'&lt;')}"</div>
              ${ln.note ? `
                <div class="flex items-center gap-2 mt-2 text-xs">
                  <span class="w-2 h-2 rounded-full shrink-0" style="background:${c.dot}"></span>
                  <span class="font-mono uppercase tracking-wider font-semibold" style="color:${c.dot}">${c.label}</span>
                  <span class="text-gray-600">— ${ln.note}</span>
                </div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

    ${(r.nextDrills || []).length ? `
      <div>
        <div class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-3">What to drill next</div>
        <div class="grid sm:grid-cols-3 gap-3">
          ${r.nextDrills.slice(0,3).map(n => `
            <div class="card p-4">
              <div class="text-sm text-gray-900 leading-snug">${n}</div>
            </div>`).join('')}
        </div>
      </div>` : ''}
  </div>`;
}
