<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers by Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f7fafd; min-height: 100vh; }
    h1,h2,h3,.font-headline { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; }
    :root { --indigo: #4f46e5; --cyan: #06b6d4; }
    .brand-grad { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
    .gradient-text { background: linear-gradient(135deg,#4f46e5,#06b6d4); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .card { background:white; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); border:1px solid #e5e7eb; }
    .card-hover:hover { box-shadow:0 10px 25px rgba(79,70,229,.1); transform:translateY(-2px); transition:all .2s; }
    .chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .chip-green{background:#ecfdf5;color:#047857} .chip-amber{background:#fffbeb;color:#b45309}
    .chip-blue{background:#eff6ff;color:#1d4ed8} .chip-red{background:#fef2f2;color:#b91c1c}
    .chip-gray{background:#f3f4f6;color:#374151} .chip-purple{background:#f5f3ff;color:#6d28d9}
    input:focus,textarea:focus,select:focus { outline:none; border-color:#4f46e5 !important; box-shadow:0 0 0 3px rgba(79,70,229,.15); }
    .btn { padding:10px 18px; border-radius:10px; font-weight:600; font-size:14px; transition:all .15s; cursor:pointer; border:none; }
    .btn-primary { background:#4f46e5; color:white; } .btn-primary:hover{background:#3730a3}
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-secondary { background:white; color:#374151; border:1px solid #d1d5db; } .btn-secondary:hover{background:#f9fafb}
    .btn-ghost { background:transparent; color:#4f46e5; padding:6px 10px; border-radius:8px; font-weight:500; font-size:13px; }
    .btn-ghost:hover { background:#eef2ff; }
    .nav-btn { padding:8px 16px; border-radius:10px; font-weight:500; font-size:14px; color:#4b5563; transition:all .15s; cursor:pointer; border:none; background:transparent; }
    .nav-btn:hover{background:#f3f4f6} .nav-btn.active{background:#4f46e5;color:white}
    .progress-bar{height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#06b6d4);border-radius:999px;transition:width .4s}
    .slide-in{animation:slideIn .25s ease-out}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .modal-back{background:rgba(17,24,39,.5);position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-dots span{animation:bounce 1.4s infinite ease-in-out both;display:inline-block;width:7px;height:7px;border-radius:50%;background:#4f46e5;margin:0 2px}
    .loading-dots span:nth-child(1){animation-delay:-.32s} .loading-dots span:nth-child(2){animation-delay:-.16s}
    @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    .glass-header{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06)}
    .setup-step{counter-increment:step}
    .setup-step::before{content:counter(step);display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:#4f46e5;color:white;border-radius:50%;font-weight:700;font-size:13px;flex-shrink:0}
    ol.setup-list{counter-reset:step;list-style:none;padding:0}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  CAREERS BY DESIGN  —  Production app
//  Stack: Google OAuth · Google Sheets API · Apps Script proxy
//  Hosting: GitHub Pages → careers.spendbydesign.co (GoDaddy CNAME)
// ═══════════════════════════════════════════════════════════════════════

// ── ① CONFIGURATION  ──────────────────────────────────────────────────
//  Fill in these four values before deploying. See SETUP_GUIDE.md.
const CONFIG = {
  CLIENT_ID:       '951337618881-m757bvgjb2luo0nr8b22g9jftccgojdh.apps.googleusercontent.com',
  SHEET_ID:        '1ssdOfq9MMtImXFswNhzgKdu2qKmyfyq9Q7Y73M46k9k',
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyOQu3sz-FicBZX57LVfgaFiRW8F-OO-aKWOrUOfyV5-hYl2WyygZUKAr67-t4vSCUw_Q/exec',
  COACH_EMAILS:    ['elyserwilson@gmail.com'],
  APP_NAME:        'Careers by Design',
  APP_TAGLINE:     'Spend your job hunt wisely.',
  API_BASE:        'https://sheets.googleapis.com/v4/spreadsheets',
};
const SETUP_COMPLETE = !CONFIG.CLIENT_ID.includes('YOUR_') &&
                       !CONFIG.SHEET_ID.includes('YOUR_') &&
                       !CONFIG.APPS_SCRIPT_URL.includes('YOUR_');

// ── ② AUTH LAYER  ─────────────────────────────────────────────────────
let tokenClient = null, accessToken = null, currentUser = null;

function initAuth() {
  if (!window.google?.accounts) { setTimeout(initAuth, 300); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets ' +
           'https://www.googleapis.com/auth/userinfo.email ' +
           'https://www.googleapis.com/auth/userinfo.profile',
    callback: async (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error, 'red'); return; }
      accessToken = resp.access_token;
      await fetchUserInfo();
      await loadAndBoot();
    },
  });
}

async function fetchUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
    { headers: { Authorization: `Bearer ${accessToken}` } });
  const info = await res.json();
  currentUser = { email: info.email, name: info.name, picture: info.picture };
}

function signIn() {
  if (!SETUP_COMPLETE) { setState({ page: 'setup' }); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}
function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; currentUser = null;
  state = { page: 'login' };
  render();
}
const isCoach = () => CONFIG.COACH_EMAILS.map(e=>e.toLowerCase()).includes(currentUser?.email?.toLowerCase());

// ── ②b COACH VIEW-AS HELPERS  ─────────────────────────────────────────
// A coach/admin can optionally "view as" a client to preview what the client sees.
// viewAs = null          → normal coach dashboard
// viewAs = 'self'        → coach previews the client experience using their own email
// viewAs = '<email>'     → coach previews the experience of a specific client
let viewAs = null;
const isViewingAsClient = () => isCoach() && viewAs !== null;
const viewedEmail = () => viewAs && viewAs !== 'self' ? viewAs : currentUser?.email;

// ── ③ DATA LAYER — Sheets API reads  ──────────────────────────────────
async function sheetsGet(range) {
  const url = `${CONFIG.API_BASE}/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Sheets read failed (${res.status}): ${err}`);
  }
  return res.json();
}

async function scriptPost(payload) {
  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, token: accessToken }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Script error');
    return data;
  } catch (e) {
    showToast('Save failed — check your Apps Script URL', 'red');
    throw e;
  }
}

// ── ④ DATA LOADING  ───────────────────────────────────────────────────
async function loadAndBoot() {
  showLoadingScreen('Loading your profile…');
  try {
    if (isCoach() && !isViewingAsClient()) {
      await loadAllClients();
    } else if (isViewingAsClient()) {
      await loadClientByEmail(viewedEmail());
    } else {
      await loadMyProfile();
    }
    render();
  } catch (err) {
    console.error('Boot error:', err);
    if (err.message?.includes('404') || err.message?.includes('does not exist')) {
      // Sheet not set up yet
      state = { page: 'sheet-missing' };
    } else {
      state = { page: 'error', errorMsg: err.message };
    }
    render();
  }
}

async function loadMyProfile() {
  const email = currentUser.email;
  // Load client row
  const clientData = await sheetsGet('Clients!A:I');
  const rows = clientData.values || [];
  const headers = rows[0] || [];
  const myRow = rows.find((r, i) => i > 0 && r[0] === email);
  if (!myRow) {
    // New client — show registration
    state = { page: 'register' };
    return;
  }
  const client = rowToClient(headers, myRow);
  // Load my jobs
  const jobData = await sheetsGet('Jobs!A:M');
  const jobRows = (jobData.values || []).slice(1).filter(r => r[0] === email);
  client.jobs = jobRows.map(rowToJob);
  // Load my prep sessions
  const prepData = await sheetsGet('PrepSessions!A:F');
  const prepRows = (prepData.values || []).slice(1).filter(r => r[0] === email);
  client.interviewPrep = buildPrepSummary(prepRows);
  state = { page: 'client', client, tab: 'intake' };
}

// Coach previews exactly what a chosen client sees. If the target row doesn't
// exist yet (e.g. the coach previewing as "self" before completing intake),
// we fall through to the registration page just like a normal client would.
async function loadClientByEmail(email) {
  const clientData = await sheetsGet('Clients!A:I');
  const rows = clientData.values || [];
  const headers = rows[0] || [];
  const theRow = rows.find((r, i) => i > 0 && r[0] === email);
  if (!theRow) {
    state = { page: 'register' };
    return;
  }
  const client = rowToClient(headers, theRow);
  const jobData = await sheetsGet('Jobs!A:M');
  const jobRows = (jobData.values || []).slice(1).filter(r => r[0] === email);
  client.jobs = jobRows.map(rowToJob);
  const prepData = await sheetsGet('PrepSessions!A:F');
  const prepRows = (prepData.values || []).slice(1).filter(r => r[0] === email);
  client.interviewPrep = buildPrepSummary(prepRows);
  state = { page: 'client', client, tab: 'intake' };
}

async function loadAllClients() {
  const [clientData, jobData, prepData] = await Promise.all([
    sheetsGet('Clients!A:I'),
    sheetsGet('Jobs!A:M'),
    sheetsGet('PrepSessions!A:F'),
  ]);
  const headers = (clientData.values || [])[0] || [];
  const clientRows = (clientData.values || []).slice(1);
  const allJobs = (jobData.values || []).slice(1);
  const allPrep = (prepData.values || []).slice(1);

  const clients = clientRows.map(row => {
    const c = rowToClient(headers, row);
    c.jobs = allJobs.filter(r => r[0] === c.email).map(rowToJob);
    c.interviewPrep = buildPrepSummary(allPrep.filter(r => r[0] === c.email));
    return c;
  });
  state = { page: 'coach', clients, drawerClient: null };
}

// ── ⑤ ROW PARSERS  ────────────────────────────────────────────────────
// Clients sheet columns: email|name|created_at|questionnaire|profile|dashboard_notes|daily_alerts|coach_notes|coach_alerts
function rowToClient(headers, row) {
  const g = (key) => row[headers.indexOf(key)] || '';
  let questionnaire = null, profile = null;
  try { questionnaire = JSON.parse(g('questionnaire') || 'null'); } catch(e) {}
  try { profile = JSON.parse(g('profile') || 'null'); } catch(e) {}
  return {
    email: g('email'), name: g('name'), createdAt: g('created_at'),
    avatar: initials(g('name')),
    resume: { uploaded: !!questionnaire?.resumeSummary, summary: questionnaire?.resumeSummary || '', fileName: questionnaire?.resumeFile || '' },
    questionnaire, profile: profile || { analyzed: false },
    dashboardNotes: g('dashboard_notes'),
    dailyAlerts: g('daily_alerts') === 'true',
    coachNotes: g('coach_notes'),
    coachAlerts: parseInt(g('coach_alerts') || '0', 10),
  };
}

// Jobs sheet columns: client_email|id|title|company|location|salary|source|posted|match|status|notes|need_app|created_at
function rowToJob(row) {
  return {
    clientEmail: row[0], id: row[1], title: row[2], company: row[3],
    location: row[4], salary: row[5], source: row[6], posted: row[7],
    match: parseInt(row[8] || '75', 10), status: row[9] || 'new',
    notes: row[10] || '', needApp: row[11] || null,
  };
}

// PrepSessions columns: client_email|id|type|status|score|note
function buildPrepSummary(rows) {
  const sessions = rows.map(r => ({
    id: r[1], type: r[2], status: r[3] || 'todo',
    score: r[4] ? parseInt(r[4]) : null, note: r[5] || '',
  }));
  return { sessions, completed: sessions.filter(s => s.status === 'done').length, total: sessions.length };
}

function initials(name) {
  const parts = (name || '?').trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || '??';
}

// ── ⑥ DATA WRITERS (via Apps Script) ─────────────────────────────────
// NOTE: when a coach is "viewing as" a client, writes target that client's row
// (viewedEmail()), so a preview behaves like the real client experience.
async function saveClientProfile(patch) {
  const email = viewedEmail();
  const client = state.client;
  const updatedQ = { ...(client.questionnaire || {}), ...patch.questionnaire };
  const updatedP = patch.profile !== undefined ? patch.profile : client.profile;
  Object.assign(state.client, patch);
  state.client.questionnaire = updatedQ;
  state.client.profile = updatedP;
  render();
  await scriptPost({
    action: 'save_client',
    email,
    name: state.client.name || currentUser.name,
    questionnaire: JSON.stringify(updatedQ),
    profile: JSON.stringify(updatedP),
    dashboard_notes: state.client.dashboardNotes || '',
    daily_alerts: state.client.dailyAlerts ? 'true' : 'false',
  });
  showToast('Saved ✓');
}

async function saveJob(job) {
  const email = viewedEmail() || job.clientEmail;
  await scriptPost({ action: 'save_job', email, job });
  showToast('Job updated ✓');
}

async function addJobs(jobs) {
  const email = viewedEmail();
  for (const j of jobs) {
    await scriptPost({ action: 'save_job', email, job: j });
  }
  state.client.jobs = [...(state.client.jobs || []), ...jobs];
  render();
}

async function savePrepSession(session) {
  const email = viewedEmail();
  await scriptPost({ action: 'save_prep', email, session });
}

async function saveCoachNotes(clientEmail, notes) {
  await scriptPost({ action: 'save_coach_notes', clientEmail, notes });
  showToast('Notes saved ✓');
}

async function registerNewClient(name) {
  await scriptPost({ action: 'register', email: currentUser.email, name });
  currentUser.name = name;
  await loadMyProfile();
  state.page = 'client';
  state.tab = 'intake';
  render();
}

async function clearCoachAlerts(clientEmail) {
  await scriptPost({ action: 'clear_alerts', clientEmail });
  const c = state.clients.find(x => x.email === clientEmail);
  if (c) { c.coachAlerts = 0; c.jobs.forEach(j => { if(j.needApp==='coach') j.needApp=null; }); }
  render();
}

// ── ⑦ STATE  ──────────────────────────────────────────────────────────
let state = { page: 'login' };
function setState(patch) { Object.assign(state, patch); render(); }

// ── ⑧ MOCK AI HELPERS (upgrade to real API later)  ───────────────────
function mockAnalyzeProfile(q) {
  const strengths = (q.strengths || []).map(s => s.charAt(0).toUpperCase() + s.slice(1));
  return {
    analyzed: true,
    strengths: [...strengths.map(s => `${s} — demonstrated across recent roles`), 'Clear communicator with a coachable mindset'].slice(0,5),
    gaps: [
      `Deeper exposure needed at the next level in ${(q.industries||['target industry'])[0]}`,
      'Quantified outcomes could be sharper on the resume',
      'Consider building external visibility (writing, speaking, community)',
    ],
    recommendedRoles: [q.roleTarget, `Senior ${q.roleTarget}`, `${q.roleTarget}, Growth`, 'Adjacent leadership role'].filter(Boolean),
    interviewFocus: ['Signature story walkthrough','Stakeholder conflict resolution','Outcome-driven deep-dive'],
    fitScore: 70 + Math.floor(Math.random() * 22),
  };
}

function mockJobSearch(q) {
  const companies = ['Linear','Notation','Versa AI','Harbor Labs','Stream','Grove','Kindred','Parcel','Moss','Indigo'];
  const sources = ['LinkedIn','Wellfound','Greenhouse','Company site'];
  const locs = [q.locationPref || 'Remote (US)', 'Remote', 'Hybrid (NYC)', 'Hybrid (SF)'];
  const n = 5 + Math.floor(Math.random() * 4);
  return Array.from({ length: n }, (_, i) => {
    const floor = q.salaryFloor || 100000;
    const lo = floor + Math.floor(Math.random() * 15000);
    const hi = lo + 25000 + Math.floor(Math.random() * 20000);
    return {
      id: 'j_' + Date.now() + '_' + i,
      title: i % 3 === 0 ? `Senior ${q.roleTarget}` : i % 3 === 1 ? `${q.roleTarget}, Growth` : `Lead, ${q.roleTarget}`,
      company: companies[(i * 3) % companies.length],
      location: locs[i % locs.length],
      salary: `$${Math.round(lo/1000)}–${Math.round(hi/1000)}k`,
      source: sources[i % sources.length],
      posted: `${1 + Math.floor(Math.random() * 10)}d ago`,
      match: 70 + Math.floor(Math.random() * 28),
      status: 'new', notes: '', needApp: null, clientEmail: viewedEmail(),
    };
  }).sort((a, b) => b.match - a.match);
}

function mockInterviewQuestions(c, jobTitle) {
  const q = c.questionnaire || {};
  const role = jobTitle || q.roleTarget || 'your target role';
  const isEng = /engineer|developer|tech|software/i.test(role);
  return {
    scenarios: [
      `Walk me through a ${isEng ? 'system design or architecture' : 'go-to-market or campaign'} project you owned end-to-end.`,
      'Describe a time you navigated a disagreement with a peer or stakeholder. What was the tradeoff?',
      'Tell me about a failure or a missed goal. What would you do differently now?',
    ],
    common: [
      'Why this role, why this company, why now?',
      `What does great ${isEng ? 'technical leadership' : 'cross-functional partnership'} look like to you?`,
      'Where do you want your career to be in 3 years?',
      'How do you prioritize when everything feels urgent?',
    ],
    tips: [
      `Lead with a signature story that showcases ${(q.strengths || ['your top strength'])[0]}.`,
      'Quantify outcomes — revenue, time saved, incidents reduced, adoption %.',
      `Pre-write a 90-day plan for the ${role} role and reference it in the final round.`,
      'Prepare 3 incisive questions for the hiring manager about scope, ambiguity, and success metrics.',
    ],
  };
}

// ── ⑨ VOICE COACH ENGINE  ────────────────────────────────────────────
const VOICE_SCRIPTS = {
  interview: {
    title: 'Interview Practice',
    intro: `Hi, I'm your Careers by Design voice coach. I'll run a behavioral interview practice with you using the STAR framework — Situation, Task, Action, Result. Press the mic button and answer each question aloud, just like a real interview. Ready? Let's go.`,
    questions: [
      { q: 'Tell me about yourself — keep it to about 90 seconds, like your professional opening statement.' },
      { q: 'Walk me through a project you led end-to-end. What was your specific role, and what was the outcome?' },
      { q: 'Describe a time you had a disagreement with a colleague or stakeholder. How did you handle it?' },
      { q: 'Tell me about a time you failed or missed a goal. What did you learn from it?' },
      { q: 'Why this role, and why now? What are you hoping your next chapter looks like?' },
    ],
  },
  negotiation: {
    title: 'Salary Negotiation',
    intro: `Hello! I'm your Careers by Design negotiation coach. I'll play recruiter and walk you through five tough negotiation moments. The goal is to help you stay calm, anchor confidently, and not leave money on the table. Press the mic when you're ready to respond. Let's begin.`,
    questions: [
      { q: "Great news — we'd like to move forward with an offer. Before I share numbers, can you tell me your salary expectations?" },
      { q: "Our budget tops out at one hundred and thirty thousand base. That's really the ceiling of our band. How does that sound?" },
      { q: "I hear you, but we can't move on base. Is there anything else that would make this work?" },
      { q: "We love you, but we're seeing candidates who'd accept the current offer as-is. Are you sure you want to hold firm?" },
      { q: 'Okay — if we can get to one forty-five base plus a ten thousand signing bonus, can we shake hands on this today?' },
    ],
  },
};

const VoiceEngine = {
  recognition: null, speaking: false,
  init() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR && !this.recognition) {
      this.recognition = new SR();
      this.recognition.continuous = false;
      this.recognition.interimResults = true;
      this.recognition.lang = 'en-US';
    }
  },
  speak(text, onend) {
    if (!('speechSynthesis' in window)) { onend?.(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const pref = voices.find(v => /Jenny|Aria|Samantha|Google US/i.test(v.name)) || voices.find(v => v.lang === 'en-US');
    if (pref) u.voice = pref;
    u.onend = () => { this.speaking = false; onend?.(); };
    u.onerror = () => { this.speaking = false; onend?.(); };
    this.speaking = true;
    window.speechSynthesis.speak(u);
  },
  listen(onResult, onStatus) {
    this.init();
    if (!this.recognition) { onStatus?.('Speech recognition not supported. Try Chrome or Edge.'); return; }
    let final = '';
    this.recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal ? (final += e.results[i][0].transcript) : (interim += e.results[i][0].transcript);
      }
      onStatus?.((final + interim).trim() || 'Listening…');
    };
    this.recognition.onend = () => onResult(final.trim());
    this.recognition.onerror = (e) => { onStatus?.('Error: ' + e.error); onResult(final.trim()); };
    try { this.recognition.start(); onStatus?.('🔴 Listening… tap mic again to stop'); }
    catch(e) { onStatus?.('Allow microphone access and try again.'); }
  },
  stop() { try { this.recognition?.stop(); } catch(e) {} },
};

function generateVoiceFeedback(mode, answer) {
  const a = (answer || '').toLowerCase();
  const words = a.split(/\s+/).filter(Boolean).length;
  const strong = [], tips = [];
  if (words < 15) tips.push('Your answer was brief — aim for 60–90 seconds with a clear situation, action, and result.');
  if (words > 250) tips.push('Good detail, but tighten it to the 2–3 most important beats and end with the outcome.');
  if (mode === 'interview') {
    if (/(result|outcome|impact|led to|grew|saved|reduced|\d+%|\$\d)/i.test(answer)) strong.push('Nice — you mentioned a concrete outcome.');
    else tips.push('Add a measurable result: dollars, %, time saved, or users impacted.');
    if (/(situation|context|first|then|finally)/i.test(answer)) strong.push('Clear story structure — I could follow the arc.');
    else tips.push('Use STAR: set up the Situation, your Task, the Action you took, and the Result.');
    if (!/\bI\b/.test(answer)) tips.push("Use 'I' more than 'we' — the interviewer needs to see your individual contribution.");
  } else {
    if (/(range|band|market|before I|what'?s budgeted)/i.test(answer)) strong.push('Good — you deflected before naming a number.');
    else if (/\$?\d{3}|\bk\b/.test(answer)) tips.push("You anchored first — try flipping it: 'What range has been budgeted for this role?'");
    if (/(bonus|equity|signing|pto|vacation|start date|remote)/i.test(answer)) strong.push('Great — you expanded beyond base salary.');
    else tips.push('Remember to negotiate the full package: signing bonus, equity, PTO, start date.');
    if (/\bokay\b|\bsure\b|\bi guess\b/i.test(answer) && !/however|but|actually/i.test(answer)) tips.push("Watch for soft-acceptance language ('okay', 'sure'). You may be conceding implicitly.");
  }
  return [strong.map(s => '✅ ' + s).join('<br>'), tips.map(t => '🎯 ' + t).join('<br>')].filter(Boolean).join('<br><br>') || '✅ Solid answer. Try to be even more specific next time.';
}

function voiceStart() {
  const mode = state.voiceMode || 'interview';
  state.voiceSession = { started: true, idx: 0, transcripts: [], feedback: [] };
  render();
  setTimeout(() => {
    VoiceEngine.speak(VOICE_SCRIPTS[mode].intro, () => {
      VoiceEngine.speak(VOICE_SCRIPTS[mode].questions[0].q);
    });
  }, 300);
}
function voiceNext() {
  const mode = state.voiceMode || 'interview';
  const script = VOICE_SCRIPTS[mode];
  const s = state.voiceSession;
  if (!s) return;
  if (s.idx >= script.questions.length - 1) {
    s.idx = script.questions.length; render();
    VoiceEngine.speak('That wraps our session. Review the transcript and coaching notes below. Keep practicing — preparation turns nerves into confidence. Great work!');
    return;
  }
  s.idx++; render();
  setTimeout(() => VoiceEngine.speak(script.questions[s.idx].q), 150);
}
function voiceMicToggle() {
  if (VoiceEngine.speaking) window.speechSynthesis?.cancel();
  const btn = document.getElementById('micBtn');
  const statusEl = document.getElementById('micStatus');
  if (btn?.dataset.listening === '1') { VoiceEngine.stop(); btn.dataset.listening = '0'; return; }
  if (btn) { btn.dataset.listening = '1'; btn.classList.add('ring-4','ring-red-300'); }
  VoiceEngine.listen((final) => {
    if (btn) { btn.dataset.listening = '0'; btn.classList.remove('ring-4','ring-red-300'); }
    const mode = state.voiceMode || 'interview';
    const s = state.voiceSession;
    if (!s || !final) { statusEl && (statusEl.textContent = 'Didn\'t catch that — try again.'); return; }
    const q = VOICE_SCRIPTS[mode].questions[s.idx].q;
    const fb = generateVoiceFeedback(mode, final);
    s.transcripts.push({ question: q, answer: final });
    s.feedback.push(fb);
    render();
    VoiceEngine.speak(fb.replace(/<[^>]+>/g,' ').replace(/[✅🎯]/g,'').trim().slice(0,220), voiceNext);
  }, (msg) => { statusEl && (statusEl.textContent = msg); });
}

function render() {
  document.getElementById('app').innerHTML = buildPage();
  bindEvents();
}

function buildPage() {
  if (!SETUP_COMPLETE) return renderSetupWizard();
  switch (state.page) {
    case 'login':    return renderLogin();
    case 'register': return renderRegister();
    case 'client':   return renderHeader() + `<main class="max-w-6xl mx-auto px-4 py-8">${renderClientTabs()}</main>` + renderFooter();
    case 'coach':    return renderHeader() + `<main class="max-w-7xl mx-auto px-4 py-8">${renderCoach()}</main>` + renderFooter();

}

// ── CHIPS  ────────────────────────────────────────────────────────────
function statusChip(s) {
  const map={new:'chip-gray',interested:'chip-blue',applied:'chip-purple',interviewing:'chip-amber',offer:'chip-green',rejected:'chip-red'};
  const label={new:'New',interested:'Interested',applied:'Applied',interviewing:'Interviewing',offer:'Offer 🎉',rejected:'Rejected'};
  return `<span class="chip ${map[s]||'chip-gray'}">${label[s]||s}</span>`;
}
function matchChip(m) {
  return `<span class="chip ${m>=90?'chip-green':m>=80?'chip-blue':m>=70?'chip-amber':'chip-gray'}">${m}% match</span>`;
}

// ── TOAST  ────────────────────────────────────────────────────────────
function showToast(msg, color='green') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;transition:opacity .3s'; document.body.appendChild(t); }
  t.innerHTML = `<div style="background:${color==='red'?'#dc2626':'#059669'};color:white;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2)">${msg}</div>`;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; }, 2500);
}

// ── EVENTS  ───────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'click';
    el.addEventListener(evt, handleAction);
  });
}

async function handleAction(e) {
  const el = e.currentTarget;
  const a = el.dataset.action;
  const c = state.client;

  switch(a) {
    case 'sign-in': signIn(); break;
    case 'sign-out': signOut(); break;

    case 'view-as': {
      // Dropdown in header — switch between coach dashboard and a client preview.
      const v = el.value;
      viewAs = (v === '__coach__') ? null : v;
      await loadAndBoot();
      break; }
    case 'view-as-client': {
      // Button in coach dashboard / drawer — open a specific client's view.
      viewAs = el.dataset.email || 'self';
      await loadAndBoot();
      break; }
    case 'exit-view-as':
      viewAs = null;
      await loadAndBoot();
      break;

    case 'complete-register': {
      const name = document.getElementById('reg-name')?.value?.trim();
      if (!name) { showToast('Enter your name', 'red'); break; }
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Creating…';
      await registerNewClient(name); break; }

    case 'set-tab': setState({ tab: el.dataset.tab }); break;
    case 'refresh': await loadAndBoot(); break;

    case 'save-resume': {
      const summary = document.getElementById('resume-summary')?.value?.trim();
      const fileName = document.getElementById('resume-filename')?.value?.trim();
      if (!summary) { showToast('Paste a resume summary first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving…';
      await saveClientProfile({ resume:{uploaded:true,summary,fileName}, questionnaire:{...(c.questionnaire||{}),resumeSummary:summary,resumeFile:fileName} });
      break; }

    case 'clear-resume':
      await saveClientProfile({ resume:{uploaded:false,summary:'',fileName:''}, questionnaire:{...(c.questionnaire||{}),resumeSummary:'',resumeFile:''} }); break;

    case 'save-questionnaire': {
      const q = {
        workStyle: document.getElementById('q-workStyle')?.value,
        roleTarget: document.getElementById('q-roleTarget')?.value?.trim(),
        locationPref: document.getElementById('q-locationPref')?.value?.trim(),
        salaryFloor: parseInt(document.getElementById('q-salaryFloor')?.value||'0',10)||null,
        strengths: document.getElementById('q-strengths')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        industries: document.getElementById('q-industries')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        energizers: document.getElementById('q-energizers')?.value?.trim(),
        drainers: document.getElementById('q-drainers')?.value?.trim(),
        resumeSummary: c.questionnaire?.resumeSummary,
        resumeFile: c.questionnaire?.resumeFile,
      };
      if (!q.roleTarget) { showToast('Enter a target role first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving & analyzing…';
      const profile = mockAnalyzeProfile(q);
      await saveClientProfile({ questionnaire:q, profile, resume:{...(c.resume||{}),uploaded:!!q.resumeSummary} });
      setState({ tab:'profile' }); break; }

    case 'search-jobs': {
      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('searchStatus');
      if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Scanning…'; }
      if (status) status.innerHTML=`<div class="card p-4 mb-4 bg-indigo-50 border-indigo-100"><div class="flex items-center gap-3 text-indigo-900"><span class="loading-dots"><span></span><span></span><span></span></span><span>Scanning LinkedIn, Wellfound, Greenhouse…</span></div></div>`;
      setTimeout(async () => {
        const fresh = mockJobSearch(c.questionnaire||{});
        const existingIds = new Set((c.jobs||[]).map(j=>j.id));
        const newJobs = fresh.filter(j=>!existingIds.has(j.id));
        await addJobs(newJobs);
      }, 1400); break; }

    case 'toggle-alerts':
      await saveClientProfile({ dailyAlerts: !c.dailyAlerts }); break;

    case 'job-status': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      job.status = el.value;
      render();
      await saveJob(job); break; }

    case 'apply-ai': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      job.needApp='self'; if(job.status==='new') job.status='interested';
      render();
      await saveJob(job);
      showToast('✨ AI is drafting your resume, cover letter & outreach message.');
      break; }

    case 'apply-coach': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      job.needApp='coach'; if(job.status==='new') job.status='interested';
      c.coachAlerts = (c.coachAlerts||0) + 1;
      render();
      await saveJob(job);
      showToast('👤 Your coach has been notified.'); break; }

    case 'edit-notes': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      const v = prompt('Notes for ' + job.title + ':', decodeURIComponent(el.dataset.notes||''));
      if (v === null) break;
      job.notes = v; render();
      await saveJob(job); break; }

    case 'prep-status': {
      const sid = el.dataset.session;
      const ip = c.interviewPrep;
      const s = ip.sessions.find(x=>x.id===sid);
      if (!s) {
        // session not yet in Sheets — create it with the new status
        const defaultTypes={ps1:'Behavioral / STAR storytelling',ps2:'Role-specific case / scenario',ps3:'Stakeholder or conflict roleplay',ps4:'Compensation negotiation',ps5:'Final round / exec-level'};
        const newS = { id:sid, type:defaultTypes[sid]||'Session', status:el.value, score:null, note:'' };
        ip.sessions.push(newS);
        ip.total = ip.sessions.length;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(newS);
      } else {
        s.status = el.value;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(s);
      } break; }

    case 'save-notes': {
      const notes = document.getElementById('dash-notes')?.value || '';
      c.dashboardNotes = notes;
      await saveClientProfile({ dashboardNotes: notes }); break; }

    case 'voice-mode':
      state.voiceSession = null;
      setState({ voiceMode: el.dataset.mode }); break;
    case 'voice-start': voiceStart(); break;
    case 'voice-mic': voiceMicToggle(); break;
    case 'voice-replay': { const q=VOICE_SCRIPTS[state.voiceMode||'interview'].questions[state.voiceSession?.idx]?.q; if(q) VoiceEngine.speak(q); break; }
    case 'voice-skip': voiceNext(); break;
    case 'voice-end': VoiceEngine.stop(); window.speechSynthesis?.cancel(); setState({ voiceSession:null }); break;

    case 'open-drawer': {
      const email = el.dataset.email;
      const dc = (state.clients||[]).find(x=>x.email===email);
      setState({ drawerClient: dc }); break; }

    case 'close-drawer':
      if (e.target===el || el.dataset.action==='close-drawer') setState({ drawerClient:null }); break;

    case 'clear-alerts': {
      const email = el.dataset.email;
      await clearCoachAlerts(email); break; }

    case 'save-coach-notes': {
      const email = el.dataset.email;
      const notes = document.getElementById('coach-notes-field')?.value||'';
      const dc = (state.clients||[]).find(x=>x.email===email);
      if (dc) dc.coachNotes = notes;
      await saveCoachNotes(email, notes); break; }
  }
}

// ── BOOT  ─────────────────────────────────────────────────────────────
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
if (SETUP_COMPLETE) initAuth();
render();
</script>
</body>
</html>
