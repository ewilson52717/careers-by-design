}
function showLoadingScreen(msg) { state = { page:'loading', loadingMsg:msg }; render(); }

// ── CHIPS  ────────────────────────────────────────────────────────────
function statusChip(s) {
  const map={new:'chip-gray',interested:'chip-blue',applied:'chip-purple',interviewing:'chip-amber',offer:'chip-green',rejected:'chip-red'};
  const label={new:'New',interested:'Interested',applied:'Applied',interviewing:'Interviewing',offer:'Offer 🎉',rejected:'Rejected'};
  return `<span class="chip ${map[s]||'chip-gray'}">${label[s]||s}</span>`;
}
function matchChip(m) {
  return `<span class="chip ${m>=90?'chip-green':m>=80?'chip-blue':m>=70?'chip-amber':'chip-gray'}">${m}% match</span>`;
}

// ── TOAST  ────────────────────────────────────────────────────────────
function showToast(msg, color='green') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;transition:opacity .3s'; document.body.appendChild(t); }
  t.innerHTML = `<div style="background:${color==='red'?'#dc2626':'#059669'};color:white;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2)">${msg}</div>`;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; }, 2500);
}

// ── EVENTS  ───────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'click';
    el.addEventListener(evt, handleAction);
  });
}

async function handleAction(e) {
  const el = e.currentTarget;
  const a = el.dataset.action;
  const c = state.client;

  switch(a) {
    case 'sign-in': signIn(); break;
    case 'sign-out': signOut(); break;

    case 'view-as': {
      // Dropdown in header — switch between coach dashboard and a client preview.
      const v = el.value;
      viewAs = (v === '__coach__') ? null : v;
      await loadAndBoot();
      break; }
    case 'view-as-client': {
      // Button in coach dashboard / drawer — open a specific client's view.
      viewAs = el.dataset.email || 'self';
      await loadAndBoot();
      break; }
    case 'exit-view-as':
      viewAs = null;
      await loadAndBoot();
      break;

    case 'complete-register': {
      const name = document.getElementById('reg-name')?.value?.trim();
      if (!name) { showToast('Enter your name', 'red'); break; }
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Creating…';
      await registerNewClient(name); break; }

    case 'set-tab': setState({ tab: el.dataset.tab }); break;
    case 'refresh': await loadAndBoot(); break;

    case 'start-assessment': {
      state.assessment = { idx: 0, answers: {}, _started: true };
      render();
      break; }

    case 'answer-question': {
      const qid = el.dataset.question;
      const val = parseInt(el.dataset.value, 10);
      if (!qid || !val) break;
      const asmt = bigFiveState();
      asmt.answers[qid] = val;
      // Auto-advance if not on the last question — keeps the flow snappy
      if (asmt.idx < BIG_FIVE_QUESTIONS.length - 1) asmt.idx += 1;
      render();
      break; }

    case 'prev-question': {
      const asmt = bigFiveState();
      if (asmt.idx > 0) asmt.idx -= 1;
      render();
      break; }

    case 'next-question': {
      const asmt = bigFiveState();
      if (asmt.idx < BIG_FIVE_QUESTIONS.length - 1) asmt.idx += 1;
      render();
      break; }

    case 'submit-assessment': {
      const asmt = bigFiveState();
      if (Object.keys(asmt.answers).length < BIG_FIVE_QUESTIONS.length) {
        showToast('Answer every question first', 'red');
        break;
      }
      const scores = scoreBigFive(asmt.answers);
      // Save the scores, then reset the transient quiz state so the
      // Get Started view advances to Phase 2 (practical profile fields).
      await saveClientProfile({
        questionnaire: { ...(c.questionnaire || {}), bigFive: scores, bigFiveAt: new Date().toISOString() },
      });
      state.assessment = { idx: 0, answers: {} };
      render();
      showToast('✓ Assessment saved — now finish your profile');
      break; }

    case 'retake-assessment': {
      // Reset the transient quiz state and re-render. Existing bigFive scores
      // stay in the questionnaire until the user finishes a fresh quiz and
      // submits — at which point they get overwritten.
      state.assessment = { idx: 0, answers: {}, _started: true };
      render();
      break; }

    case 'save-display-name': {
      const first = document.getElementById('display-first-name')?.value?.trim() || '';
      const last  = document.getElementById('display-last-name')?.value?.trim() || '';
      if (!first) { showToast('First name is required', 'red'); break; }
      const fullName = (first + ' ' + last).trim();
      state.client.name = fullName;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Saving…';
      await saveClientProfile({ name: fullName });
      break; }

    case 'save-resume': {
      const summary = document.getElementById('resume-summary')?.value?.trim();
      const fileName = document.getElementById('resume-filename')?.value?.trim();
      if (!summary) { showToast('Paste a resume summary first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving…';
      await saveClientProfile({ resume:{uploaded:true,summary,fileName}, questionnaire:{...(c.questionnaire||{}),resumeSummary:summary,resumeFile:fileName} });
      break; }

    case 'clear-resume':
      await saveClientProfile({ resume:{uploaded:false,summary:'',fileName:''}, questionnaire:{...(c.questionnaire||{}),resumeSummary:'',resumeFile:''} }); break;

    case 'save-questionnaire': {
      const q = {
        workStyle: document.getElementById('q-workStyle')?.value,
        roleTarget: document.getElementById('q-roleTarget')?.value?.trim(),
        locationPref: document.getElementById('q-locationPref')?.value?.trim(),
        salaryFloor: parseCurrency(document.getElementById('q-salaryFloor')?.value),
        strengths: document.getElementById('q-strengths')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        industries: document.getElementById('q-industries')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        energizers: document.getElementById('q-energizers')?.value?.trim(),
        drainers: document.getElementById('q-drainers')?.value?.trim(),
        resumeSummary: c.questionnaire?.resumeSummary,
        resumeFile: c.questionnaire?.resumeFile,
      };
      if (!q.roleTarget) { showToast('Enter a target role first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving & analyzing…';
      let profile;
      try {
        const resp = await scriptCall({ action: 'analyze_profile', email: viewedEmail(), questionnaire: q });
        profile = resp.configured && resp.profile ? resp.profile : mockAnalyzeProfile(q);
        if (!resp.configured) {
          showToast('Using sample analysis — set ANTHROPIC_API_KEY for real output', 'red');
        }
      } catch (e) {
        console.error(e);
        profile = mockAnalyzeProfile(q);
        showToast('Analysis failed — showing sample', 'red');
      }
      await saveClientProfile({ questionnaire:q, profile, resume:{...(c.resume||{}),uploaded:!!q.resumeSummary} });
      setState({ tab:'profile' }); break; }

    case 'search-jobs': {
      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('searchStatus');
      const setStatus = (msg) => {
        if (status) status.innerHTML = `<div class="card p-4 mb-4 bg-[#eef2ff] border-[#e5e7eb]"><div class="flex items-center gap-3 text-[#1e1b4b]"><span class="loading-dots"><span></span><span></span><span></span></span><span>${msg}</span></div></div>`;
      };
      if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Scanning…'; }
      setStatus('Pulling fresh listings…');
      try {
        const resp = await scriptCall({ action: 'search_jobs', email: viewedEmail(), questionnaire: c.questionnaire || {} });
        let fresh;
        if (resp.configured && Array.isArray(resp.jobs)) {
          fresh = resp.jobs.map(j => ({ ...j, clientEmail: viewedEmail() }));
        } else {
          fresh = mockJobSearch(c.questionnaire || {});
          showToast('Using sample jobs — set RAPIDAPI_KEY for live results', 'red');
        }
        // Dedup against existing
        const existingSigs = new Set((c.jobs || []).map(jobSignature));
        const newJobs = fresh.filter(j => !existingSigs.has(jobSignature(j)));
        const skipped = fresh.length - newJobs.length;
        if (newJobs.length === 0) {
          showToast(skipped > 0 ? `No new jobs — all ${skipped} were already in your list` : 'No jobs found');
        } else {
          // Keyword-baseline match score so the cards never say "0%"
          newJobs.forEach(j => { j.match = j.match || keywordMatchScore(j, c.questionnaire || {}); });

          // Batch-enrich via Claude: per-job fit summary, culture, outreach
          setStatus('Claude is analyzing fit, culture, and outreach strategy…');
          try {
            const enr = await scriptCall({
              action: 'enrich_jobs',
              email: viewedEmail(),
              jobs: newJobs,
              questionnaire: c.questionnaire || {},
            });
            if (enr.configured && Array.isArray(enr.enriched)) {
              enr.enriched.forEach((e, i) => {
                const j = newJobs[i]; if (!j) return;
                j.match = e.match || j.match;
                j.extra = j.extra || {};
                j.extra.fitSummary = e.fitSummary;
                j.extra.cultureHighlights = e.cultureHighlights;
                j.extra.outreachStrategy = e.outreachStrategy;
              });
            }
          } catch (enrichErr) {
            console.warn('[enrich_jobs skipped]', enrichErr);
            // Non-fatal — we keep keyword-score matches and continue
          }

          openSwipeDeck(newJobs);
          if (skipped > 0) {
            showToast(`${newJobs.length} new to review · ${skipped} duplicate${skipped>1?'s':''} skipped`);
          }
        }
      } catch (e) {
        console.error(e);
        showToast('Job search failed — ' + (e.message || 'see console'), 'red');
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Find jobs now'; }
        if (status) status.innerHTML = '';
      }
      break; }

    case 'toggle-alerts':
      await saveClientProfile({ dailyAlerts: !c.dailyAlerts }); break;

    case 'job-status': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      job.status = el.value;
      render();
      await saveJob(job); break; }

    case 'toggle-job-details': toggleJobUI(el.dataset.job, 'details'); break;
    case 'toggle-job-apply':   toggleJobUI(el.dataset.job, 'apply');   break;

    case 'delete-job': {
      const jid = el.dataset.job;
      const title = el.dataset.title || 'this job';
      if (!confirm(`Delete "${title}"? This can't be undone.`)) break;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      try {
        await scriptCall({ action: 'delete_job', email: viewedEmail(), jobId: jid });
        c.jobs = c.jobs.filter(j => j.id !== jid);
        render();
        showToast('Job deleted');
      } catch (e) {
        console.error(e);
        showToast('Delete failed — ' + (e.message || 'see console'), 'red');
      }
      break; }

    case 'swipe-yes':  commitSwipe('yes'); break;
    case 'swipe-no':   commitSwipe('no');  break;
    case 'swipe-exit': await finalizeSwipeDeck(); break;
    case 'swipe-undo': {
      const d = state.swipeDeck;
      if (!d?.active || d.idx === 0) break;
      d.idx -= 1;
      // If the last action was a "yes" (job is in liked[]), pull it back out
      const prev = d.jobs[d.idx];
      const likedIdx = d.liked.findIndex(j => j.id === prev.id);
      if (likedIdx !== -1) d.liked.splice(likedIdx, 1);
      render();
      break; }

    case 'toggle-select-mode': {
      const sel = jobsSelectState();
      sel.mode = !sel.mode;
      if (!sel.mode) sel.selected.clear();
      render();
      break; }

    case 'toggle-job-select': {
      const sel = jobsSelectState();
      const jid = el.dataset.job;
      if (sel.selected.has(jid)) sel.selected.delete(jid);
      else sel.selected.add(jid);
      render();
      break; }

    case 'toggle-select-all': {
      const sel = jobsSelectState();
      const allIds = (c.jobs || []).map(j => j.id);
      const allSelected = allIds.length > 0 && sel.selected.size === allIds.length;
      sel.selected = allSelected ? new Set() : new Set(allIds);
      render();
      break; }

    case 'delete-selected-jobs': {
      const sel = jobsSelectState();
      const ids = Array.from(sel.selected);
      if (ids.length === 0) break;
      if (!confirm(`Delete ${ids.length} job${ids.length>1?'s':''}? This can't be undone.`)) break;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Deleting…';
      try {
        await scriptCall({ action: 'delete_jobs_bulk', email: viewedEmail(), jobIds: ids });
        c.jobs = (c.jobs || []).filter(j => !sel.selected.has(j.id));
        sel.selected.clear();
        sel.mode = false;
        render();
        showToast(`Deleted ${ids.length} job${ids.length>1?'s':''}`);
      } catch (e) {
        console.error(e);
        showToast('Delete failed — ' + (e.message || 'see console'), 'red');
      }
      break; }

    case 'generate-materials':
    case 'regenerate-materials': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Drafting with Claude…';
      try {
        const resp = await scriptCall({ action: 'generate_materials', email: viewedEmail(), job });
        if (resp.configured && resp.materials) {
          job.extra = job.extra || {};
          job.extra.application = resp.materials;
        } else {
          // API key not set yet — use the stub so the UX still works
          job.extra = job.extra || {};
          job.extra.application = mockApplicationMaterials(job, c);
          showToast('Using draft stub — set ANTHROPIC_API_KEY in Script Properties for real output', 'red');
        }
      } catch (e) {
        console.error(e);
        showToast('Draft failed — ' + (e.message || 'see console'), 'red');
        break;
      }
      jobUI(jid).apply = true;
      render();
      await saveJob(job);
      showToast('✨ Drafts ready — review, tweak, then submit');
      break; }

    case 'mark-submitted': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      job.extra = job.extra || {};
      job.extra.submission = { submitted: true, submittedAt: new Date().toISOString() };
      job.status = 'applied';
      render();
      await saveJob(job);
      showToast('✓ Marked as submitted');
      break; }

    case 'copy-material': {
      const jid = el.dataset.job;
      const field = el.dataset.field;
      const job = c.jobs.find(j => j.id === jid);
      const text = job?.extra?.application?.[field] || '';
      try { await navigator.clipboard.writeText(text); showToast('Copied to clipboard ✓'); }
      catch { showToast('Copy failed — select the text manually', 'red'); }
      break; }

    case 'edit-material': {
      const jid = el.dataset.job;
      const field = el.dataset.field;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const current = job.extra?.application?.[field] || '';
      const updated = prompt('Edit — your changes are saved when you hit OK:', current);
      if (updated === null) break;
      job.extra = job.extra || {};
      job.extra.application = { ...(job.extra.application || {}), [field]: updated };
      render();
      await saveJob(job);
      break; }

    case 'edit-job-desc': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const v = prompt('Job description:', job.extra?.description || '');
      if (v === null) break;
      job.extra = { ...(job.extra || {}), description: v };
      render();
      await saveJob(job);
      break; }

    case 'edit-company-info': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const co = job.extra?.company || {};
      const industry = prompt('Industry:', co.industry || ''); if (industry === null) break;
      const size = prompt('Company size (e.g. 51-200):', co.size || ''); if (size === null) break;
      const gs = prompt('Glassdoor rating (0-5):', co.glassdoorRating || ''); if (gs === null) break;
      const awards = prompt('Awards / certs (comma-separated):', (co.awards || []).join(', '));
      if (awards === null) break;
      const website = prompt('Website domain (for logo, e.g. linear.app):', job.extra?.website || '');
      if (website === null) break;
      job.extra = {
        ...(job.extra || {}),
        website: website.trim(),
        company: {
          ...co,
          industry: industry.trim(),
          size: size.trim(),
          glassdoorRating: parseFloat(gs) || 0,
          awards: awards.split(',').map(s => s.trim()).filter(Boolean),
        },
      };
      render();
      await saveJob(job);
      break; }

    case 'fetch-culture-intel':
    case 'refresh-culture-intel': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const company = job.company;
      if (!company) { showToast('No company on file for this job', 'red'); break; }
      const refresh = el.dataset.action === 'refresh-culture-intel';
      const origLabel = el.innerHTML;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Scanning Reddit…';
      try {
        const resp = await scriptCall({
          action: 'fetch_company_culture',
          email: viewedEmail(),
          company,
          refresh,
        });
        if (resp.insights) {
          job.extra = job.extra || {};
          job.extra.communityInsights = resp.insights;
          render();
          await saveJob(job);
          showToast(resp.cached ? 'Insights loaded (cached)' : '🗣 Insights pulled');
        } else {
          el.disabled = false; el.innerHTML = origLabel;
          showToast('No insights returned', 'red');
        }
      } catch (e) {
        console.error(e);
        el.disabled = false; el.innerHTML = origLabel;
        showToast('Fetch failed — ' + (e.message || 'see console'), 'red');
      }
      break; }

    case 'edit-coach-company-notes': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const v = prompt('Coach notes about this company (visible to the client):', job.extra?.company?.coachNotes || '');
      if (v === null) break;
      job.extra = { ...(job.extra || {}), company: { ...(job.extra?.company || {}), coachNotes: v } };
      render();
      await saveJob(job);
      break; }

    case 'edit-notes': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      const v = prompt('Notes for ' + job.title + ':', decodeURIComponent(el.dataset.notes||''));
      if (v === null) break;
      job.notes = v; render();
      await saveJob(job); break; }

    case 'prep-status': {
      const sid = el.dataset.session;
      const ip = c.interviewPrep;
      const s = ip.sessions.find(x=>x.id===sid);
      if (!s) {
        // session not yet in Sheets — create it with the new status
        const defaultTypes={ps1:'Behavioral / STAR storytelling',ps2:'Role-specific case / scenario',ps3:'Stakeholder or conflict roleplay',ps4:'Compensation negotiation',ps5:'Final round / exec-level'};
        const newS = { id:sid, type:defaultTypes[sid]||'Session', status:el.value, score:null, note:'' };
        ip.sessions.push(newS);
        ip.total = ip.sessions.length;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(newS);
      } else {
        s.status = el.value;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(s);
      } break; }

    case 'save-notes': {
      const notes = document.getElementById('dash-notes')?.value || '';
      c.dashboardNotes = notes;
      await saveClientProfile({ dashboardNotes: notes }); break; }

    // Voice Coach (teleprompter redesign) ─────────────────────────────
    case 'voice-pick-drill': {
      const did = el.dataset.drill;
      state.voice = { phase:'ready', drillId:did, takeNo:1, seconds:0, transcript:'', review:null };
      render();
      break; }
    case 'voice-speak-prompt': {
      const d = findDrill(voiceState().drillId);
      if (d) VoiceEngine.speak(d.title);
      break; }
    case 'voice-begin-take':
      voiceBeginTake();
      break;
    case 'voice-end-take':
      await voiceEndTake();
      break;
    case 'voice-retake':
      voiceRetake();
      break;
    case 'voice-back':
      voiceBackToDrills();
      break;

    case 'open-drawer': {
      const email = el.dataset.email;
      const dc = (state.clients||[]).find(x=>x.email===email);
      setState({ drawerClient: dc }); break; }

    case 'close-drawer':
      if (e.target===el || el.dataset.action==='close-drawer') setState({ drawerClient:null }); break;

    case 'clear-alerts': {
      const email = el.dataset.email;
      await clearCoachAlerts(email); break; }

    case 'save-coach-notes': {
      const email = el.dataset.email;
      const notes = document.getElementById('coach-notes-field')?.value||'';
      const dc = (state.clients||[]).find(x=>x.email===email);
      if (dc) dc.coachNotes = notes;
      await saveCoachNotes(email, notes); break; }
  }
}

// ── BOOT  ─────────────────────────────────────────────────────────────
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Picks the best-sounding English voice the browser offers, ranked by our
// subjective quality preferences. Edge (Azure neural) > Chrome's Google
// Neural2 > macOS premium voices > anything en-US. Returns null if nothing
// matches — the browser will then use its platform default, which is fine.
function pickBestVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices?.length) return null;
  const ranked = [
    // Edge / Azure neural — very natural, multiple voices
    v => /Microsoft.*(Aria|Jenny|Emma|Guy|Davis|Jason|Sara|Tony).*Online.*Neural/i.test(v.name),
    v => /Microsoft.*(Aria|Jenny|Emma|Sara).*Neural/i.test(v.name),
    // Chrome Google US neural
    v => /Google US English/i.test(v.name) && /en-US/i.test(v.lang),
    v => /en-US-Neural2/i.test(v.voiceURI || v.name),
    // macOS premium ("enhanced") voices
    v => /(Samantha|Alex|Ava|Karen|Serena).*Premium/i.test(v.name),
    v => /Samantha|Alex|Ava|Karen|Serena/i.test(v.name),
    // Any Google or enhanced English voice
    v => /Google/i.test(v.name) && /en/i.test(v.lang),
    v => /en-US/i.test(v.lang),
    v => /en/i.test(v.lang),
  ];
  for (const test of ranked) {
    const hit = voices.find(test);
    if (hit) return hit;
  }
  return voices[0] || null;
}
if (SETUP_COMPLETE) {
  initAuth();
  // If we have a still-valid saved session, jump straight back into the app
  // instead of showing the login screen on every refresh.
  const saved = loadSession();
  if (saved) {
    accessToken  = saved.accessToken;
    currentUser  = saved.user;
    loadAndBoot();   // shows the loading screen, then routes to client/coach view
  } else {
    render();
  }
} else {
  render();
}
