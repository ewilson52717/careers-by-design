<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers by Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <!-- Resume upload: extract text from PDF and DOCX so the AI has something to analyze -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <style>
    /* ── Careers by Design · Parlor-inspired theme ─────────────────────────
       palette: warm cream + ink · single ember accent · moss secondary
       type:    Fraunces display · Inter body                                */
    :root {
      --cream:     #faf8f4;
      --ivory:     #fffdf8;
      --ink:       #1a1410;
      --ink-2:     #3b342a;
      --ink-3:     #7a6f5f;
      --edge:      #e9dfcc;
      --edge-soft: #f0e8d8;
      --parchment: #f5ede0;
      --ember:     #a64c2c;
      --ember-2:   #7a3620;
      --ember-3:   #c26b45;
      --moss:      #6d7a52;
      --indigo:    var(--ember);   /* legacy alias */
      --cyan:      var(--moss);    /* legacy alias */
    }
    * { box-sizing: border-box; }
    html, body { background: var(--cream); }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink-2); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4,.font-headline { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-feature-settings: "ss01","ss02"; letter-spacing: -0.01em; color: var(--ink); }
    h1,h2 { letter-spacing: -0.02em; }
    .font-serif { font-family: 'Fraunces', Georgia, serif; }
    .brand-grad { background: linear-gradient(135deg, var(--ember) 0%, var(--ember-3) 100%); }
    .gradient-text { background: linear-gradient(135deg, var(--ember), var(--ember-3)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .card { background: var(--ivory); border-radius:14px; box-shadow:0 1px 2px rgba(26,20,16,.04); border:1px solid var(--edge); }
    .card-hover:hover { box-shadow:0 12px 28px rgba(166,76,44,.10); transform:translateY(-2px); transition:all .2s; border-color: #ddd0b4; }
    .chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; letter-spacing:.01em; }
    .chip-green {background:#eef3e8; color:#4a5c3e}
    .chip-amber {background:#faeedc; color:#8a5a1f}
    .chip-blue  {background:#e9e6db; color:#5a6147}   /* repurposed: soft sage */
    .chip-red   {background:#f4dfd4; color:#8a3b20}
    .chip-gray  {background:var(--parchment); color:var(--ink-2)}
    .chip-purple{background:#f1e5dc; color:var(--ember-2)}  /* repurposed: dusty ember */
    input,textarea,select { background: var(--ivory); color: var(--ink); border: 1px solid var(--edge); }
    input:focus,textarea:focus,select:focus { outline:none; border-color: var(--ember) !important; box-shadow:0 0 0 3px rgba(166,76,44,.14); }
    .btn { padding:10px 18px; border-radius:10px; font-weight:600; font-size:14px; transition:all .15s; cursor:pointer; border:none; letter-spacing:.005em; }
    .btn-primary { background: var(--ember); color: var(--ivory); }
    .btn-primary:hover { background: var(--ember-2); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-secondary { background: var(--ivory); color: var(--ink-2); border:1px solid var(--edge); }
    .btn-secondary:hover { background: var(--parchment); }
    .btn-ghost { background:transparent; color: var(--ember); padding:6px 10px; border-radius:8px; font-weight:600; font-size:13px; }
    .btn-ghost:hover { background: var(--parchment); }
    .nav-btn { padding:8px 16px; border-radius:10px; font-weight:500; font-size:14px; color: var(--ink-2); transition:all .15s; cursor:pointer; border:none; background:transparent; }
    .nav-btn:hover { background: var(--parchment); color: var(--ink); }
    .nav-btn.active { background: var(--ink); color: var(--cream); }
    .progress-bar { height:6px; background: var(--edge-soft); border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg, var(--ember), var(--ember-3)); border-radius:999px; transition:width .4s; }
    .slide-in { animation:slideIn .25s ease-out; }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .modal-back { background:rgba(26,20,16,.45); position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
    .spinner { width:20px; height:20px; border:2px solid rgba(255,253,248,.3); border-top-color: var(--ivory); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-dots span { animation:bounce 1.4s infinite ease-in-out both; display:inline-block; width:7px; height:7px; border-radius:50%; background: var(--ember); margin:0 2px; }
    .loading-dots span:nth-child(1) { animation-delay:-.32s } .loading-dots span:nth-child(2) { animation-delay:-.16s }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
    .glass-header { background:rgba(250,248,244,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--edge); }
    .setup-step { counter-increment:step; }
    .setup-step::before { content:counter(step); display:flex; align-items:center; justify-content:center; width:28px; height:28px; background: var(--ink); color: var(--cream); border-radius:50%; font-weight:700; font-size:13px; flex-shrink:0; font-family: 'Fraunces', serif; }
    ol.setup-list { counter-reset:step; list-style:none; padding:0; }
    /* subtle text-selection */
    ::selection { background: var(--parchment); color: var(--ink); }
    /* link default */
    a { color: var(--ember); }
    a:hover { color: var(--ember-2); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  CAREERS BY DESIGN  —  Production app
//  Stack: Google OAuth · Google Sheets API · Apps Script proxy
//  Hosting: GitHub Pages → careers.spendbydesign.co (GoDaddy CNAME)
// ═══════════════════════════════════════════════════════════════════════

// ── ① CONFIGURATION  ──────────────────────────────────────────────────
//  Fill in these four values before deploying. See SETUP_GUIDE.md.
const CONFIG = {
  CLIENT_ID:       '1013190318117-n1ve6s2te8j3f7io4g1knht315jap8dm.apps.googleusercontent.com',
  SHEET_ID:        '1ssdOfq9MMtImXFswNhzgKdu2qKmyfyq9Q7Y73M46k9k',
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyOQu3sz-FicBZX57LVfgaFiRW8F-OO-aKWOrUOfyV5-hYl2WyygZUKAr67-t4vSCUw_Q/exec',
  COACH_EMAILS:    ['elyserwilson@gmail.com'],
  APP_NAME:        'Careers by Design',
  APP_TAGLINE:     'Spend your job hunt wisely.',
};
const SETUP_COMPLETE = !CONFIG.CLIENT_ID.includes('YOUR_') &&
                       !CONFIG.SHEET_ID.includes('YOUR_') &&
                       !CONFIG.APPS_SCRIPT_URL.includes('YOUR_');

// ── ② AUTH LAYER  ─────────────────────────────────────────────────────
let tokenClient = null, accessToken = null, currentUser = null;

// Persist session in localStorage so refreshes, new tabs, and short browser
// restarts don't force a re-login. We honor the token's own expiry (Google
// issues ~1-hour tokens); once expired the user signs in again.
const SESSION_KEY = 'cbd.session.v1';

function saveSession(tokenResp) {
  try {
    const expiresAt = Date.now() + ((tokenResp?.expires_in || 3500) * 1000);
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      accessToken: tokenResp.access_token,
      user: currentUser,
      expiresAt,
    }));
  } catch (e) { /* storage may be disabled; fail silently */ }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (!saved?.accessToken || !saved.expiresAt || !saved.user?.email) return null;
    // 30-second safety buffer so we don't hand the proxy a token about to expire mid-request
    if (Date.now() >= saved.expiresAt - 30_000) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return saved;
  } catch { return null; }
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

function initAuth() {
  if (!window.google?.accounts) { setTimeout(initAuth, 300); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    // Non-sensitive scopes only. Sheet reads/writes go through the Apps
    // Script proxy, so neither clients nor coaches need direct Sheet access.
    scope: 'https://www.googleapis.com/auth/userinfo.email ' +
           'https://www.googleapis.com/auth/userinfo.profile',
    callback: async (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error, 'red'); return; }
      accessToken = resp.access_token;
      await fetchUserInfo();
      saveSession(resp);
      await loadAndBoot();
    },
  });
}

async function fetchUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
    { headers: { Authorization: `Bearer ${accessToken}` } });
  const info = await res.json();
  currentUser = { email: info.email, name: info.name, picture: info.picture };
}

function signIn() {
  if (!SETUP_COMPLETE) { setState({ page: 'setup' }); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}
function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; currentUser = null;
  clearSession();
  state = { page: 'login' };
  render();
}

// Called when the proxy tells us the token is no longer valid. Clears the
// stored session and kicks the user back to the login screen so they can
// sign in fresh. Avoids spinning in a retry loop on a dead token.
function handleExpiredSession() {
  accessToken = null; currentUser = null;
  clearSession();
  state = { page: 'login' };
  render();
  showToast('Your session expired — please sign in again', 'red');
}
const isCoach = () => CONFIG.COACH_EMAILS.map(e=>e.toLowerCase()).includes(currentUser?.email?.toLowerCase());

// ── ②b COACH VIEW-AS HELPERS  ─────────────────────────────────────────
// A coach/admin can optionally "view as" a client to preview what the client sees.
// viewAs = null          → normal coach dashboard
// viewAs = 'self'        → coach previews the client experience using their own email
// viewAs = '<email>'     → coach previews the experience of a specific client
let viewAs = null;
const isViewingAsClient = () => isCoach() && viewAs !== null;
const viewedEmail = () => viewAs && viewAs !== 'self' ? viewAs : currentUser?.email;

// ── ③ DATA LAYER — every request goes through the Apps Script proxy  ──
//  The front-end no longer hits the Sheets API directly. This means:
//   • clients never need access to the raw Sheet
//   • the server (Apps Script, running as the coach) is the only thing that
//     reads/writes rows, and it enforces per-email scoping
//   • the OAuth scope can stay small (userinfo only)

// Low-level: fires one POST to the Apps Script Web App. Errors bubble up.
// If the proxy reports the token is no longer valid, we clear the saved
// session and bounce the user back to login.
async function scriptCall(payload) {
  // Content-Type MUST be text/plain — application/json triggers a CORS
  // preflight that Apps Script Web Apps don't answer. Apps Script reads
  // the raw body via e.postData.contents regardless of content-type.
  const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ ...payload, token: accessToken }),
  });
  if (!res.ok) {
    throw new Error(`HTTP ${res.status} — is your Apps Script deployed with "Who has access: Anyone"?`);
  }
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error(`Non-JSON response (likely a Google login page). First 120 chars: ${text.slice(0,120)}`); }
  if (!data.ok) {
    // Token has expired or been revoked — kick back to login cleanly
    if (/unauthorized/i.test(data.error || '') || /invalid_token/i.test(data.error || '')) {
      handleExpiredSession();
    }
    throw new Error(data.error || 'Script error');
  }
  return data;
}

// For reads: let errors propagate so loadAndBoot can show a proper error screen.
async function scriptGet(payload) {
  return scriptCall(payload);
}

// For writes: also surface a toast so the user knows their save failed.
async function scriptPost(payload) {
  try {
    return await scriptCall(payload);
  } catch (e) {
    console.error('[scriptPost]', e);
    showToast(`Save failed — ${e.message || 'check your Apps Script URL'}`, 'red');
    throw e;
  }
}

// ── ④ DATA LOADING  ───────────────────────────────────────────────────
async function loadAndBoot() {
  showLoadingScreen('Loading your profile…');
  try {
    if (isCoach() && !isViewingAsClient()) {
      await loadAllClients();
    } else if (isViewingAsClient()) {
      await loadClientByEmail(viewedEmail());
    } else {
      await loadMyProfile();
    }
    render();
  } catch (err) {
    console.error('Boot error:', err);
    if (err.message?.includes('404') || err.message?.includes('does not exist')) {
      // Sheet not set up yet
      state = { page: 'sheet-missing' };
    } else {
      state = { page: 'error', errorMsg: err.message };
    }
    render();
  }
}

// Parses a scoped-data response (from get_my_data / get_client_data) into a
// fully-shaped client object. Returns null if the client row doesn't exist
// yet (new user who hasn't registered).
function hydrateClient(resp) {
  const clientRows = resp.clients?.values || [];
  const headers    = clientRows[0] || [];
  const row        = clientRows[1];
  if (!row) return null;
  const client = rowToClient(headers, row);
  client.jobs = (resp.jobs?.values || []).slice(1).map(rowToJob);
  client.interviewPrep = buildPrepSummary((resp.prep?.values || []).slice(1));
  return client;
}

async function loadMyProfile() {
  const resp = await scriptGet({ action: 'get_my_data' });
  const client = hydrateClient(resp);
  if (!client) { state = { page: 'register' }; return; }
  state = { page: 'client', client, tab: 'intake' };
}

// Coach previews exactly what a chosen client sees. If the target row doesn't
// exist yet (e.g. the coach previewing as "self" before completing intake),
// we fall through to the registration page just like a normal client would.
async function loadClientByEmail(email) {
  const resp = await scriptGet({ action: 'get_client_data', email });
  const client = hydrateClient(resp);
  if (!client) { state = { page: 'register' }; return; }
  state = { page: 'client', client, tab: 'intake' };
}

async function loadAllClients() {
  const resp = await scriptGet({ action: 'get_all_data' });
  const headers    = (resp.clients?.values || [])[0] || [];
  const clientRows = (resp.clients?.values || []).slice(1);
  const allJobs    = (resp.jobs?.values    || []).slice(1);
  const allPrep    = (resp.prep?.values    || []).slice(1);

  const clients = clientRows.map(row => {
    const c = rowToClient(headers, row);
    c.jobs = allJobs.filter(r => r[0] === c.email).map(rowToJob);
    c.interviewPrep = buildPrepSummary(allPrep.filter(r => r[0] === c.email));
    return c;
  });
  state = { page: 'coach', clients, drawerClient: null };
}

// ── ⑤ ROW PARSERS  ────────────────────────────────────────────────────
// Clients sheet columns: email|name|created_at|questionnaire|profile|dashboard_notes|daily_alerts|coach_notes|coach_alerts
function rowToClient(headers, row) {
  const g = (key) => row[headers.indexOf(key)] || '';
  let questionnaire = null, profile = null;
  try { questionnaire = JSON.parse(g('questionnaire') || 'null'); } catch(e) {}
  try { profile = JSON.parse(g('profile') || 'null'); } catch(e) {}
  return {
    email: g('email'), name: g('name'), createdAt: g('created_at'),
    avatar: initials(g('name')),
    resume: { uploaded: !!questionnaire?.resumeSummary, summary: questionnaire?.resumeSummary || '', fileName: questionnaire?.resumeFile || '' },
    questionnaire, profile: profile || { analyzed: false },
    dashboardNotes: g('dashboard_notes'),
    dailyAlerts: g('daily_alerts') === 'true',
    coachNotes: g('coach_notes'),
    coachAlerts: parseInt(g('coach_alerts') || '0', 10),
  };
}

// Jobs sheet columns: client_email|id|title|company|location|salary|source|posted|match|status|notes|need_app|created_at|url|extra
// `extra` is a JSON blob holding description, company/culture data,
// application drafts, and submission status. Stored as JSON so we can add
// fields without migrating the sheet.
function rowToJob(row) {
  let extra = {};
  try { extra = row[14] ? JSON.parse(row[14]) : {}; } catch { extra = {}; }
  return {
    clientEmail: row[0], id: row[1], title: row[2], company: row[3],
    location: row[4], salary: row[5], source: row[6], posted: row[7],
    match: parseInt(row[8] || '75', 10), status: row[9] || 'new',
    notes: row[10] || '', needApp: row[11] || null,
    url: row[13] || '',
    extra, // { description, website, company:{...}, application:{...}, submission:{...} }
  };
}

// PrepSessions columns: client_email|id|type|status|score|note
function buildPrepSummary(rows) {
  const sessions = rows.map(r => ({
    id: r[1], type: r[2], status: r[3] || 'todo',
    score: r[4] ? parseInt(r[4]) : null, note: r[5] || '',
  }));
  return { sessions, completed: sessions.filter(s => s.status === 'done').length, total: sessions.length };
}

function initials(name) {
  const parts = (name || '?').trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || '??';
}

// ── CURRENCY HELPERS  ──────────────────────────────────────────────────
//  - formatCurrency(120000) → "$120,000"
//  - parseCurrency("$120,000") → 120000
//  Used by money inputs (salary floor, etc.) which display formatted
//  but store raw integers under the hood.
const _currencyFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
function formatCurrency(n) {
  const num = Number(n);
  if (!Number.isFinite(num) || num === 0) return '';
  return _currencyFmt.format(num);
}
function parseCurrency(str) {
  if (str == null) return null;
  const cleaned = String(str).replace(/[^0-9.\-]/g, '');
  if (!cleaned) return null;
  const n = parseInt(cleaned, 10);
  return Number.isFinite(n) ? n : null;
}
// Wires up an input element so it shows formatted currency on blur and
// raw digits while the user is typing. Call after render() — it's a no-op
// on missing elements so it's safe to call defensively.
function bindCurrencyInput(id) {
  const el = document.getElementById(id);
  if (!el || el._currencyBound) return;
  el._currencyBound = true;
  const reformat = () => {
    const n = parseCurrency(el.value);
    el.value = n != null ? formatCurrency(n) : '';
  };
  const strip = () => {
    const n = parseCurrency(el.value);
    el.value = n != null ? String(n) : '';
  };
  el.addEventListener('focus', strip);
  el.addEventListener('blur', reformat);
  // initial format (in case the value was set via template)
  if (el.value && document.activeElement !== el) reformat();
}

// ── RESUME FILE UPLOAD  ────────────────────────────────────────────────
// Client picks a file → we extract the text (PDF via pdf.js, DOCX via
// mammoth.js, plain text direct) and pipe it into the summary textarea
// so the AI has something to analyze. The file itself isn't stored anywhere —
// only the extracted text + the original filename live in the Sheet.
async function handleResumeFilePick(evt) {
  const file = evt.target?.files?.[0];
  if (!file) return;
  const summaryEl  = document.getElementById('resume-summary');
  const fileNameEl = document.getElementById('resume-filename');
  if (fileNameEl) fileNameEl.value = file.name;

  const ext = (file.name.split('.').pop() || '').toLowerCase();
  const MAX_CHARS = 30000; // leave headroom under the 50k Sheets cell limit

  try {
    showToast('Reading ' + file.name + '…');
    let text = '';

    if (ext === 'pdf' || file.type === 'application/pdf') {
      text = await extractPdfText(file);
    } else if (ext === 'docx' || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
      text = await extractDocxText(file);
    } else if (ext === 'doc') {
      showToast('.doc files are not supported — please save as .docx or PDF', 'red');
      return;
    } else {
      // treat as plain text (.txt, .md, or unknown)
      text = await file.text();
    }

    text = (text || '').replace(/\s+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
    if (!text) {
      showToast('Couldn\'t extract text — paste a summary manually', 'red');
      return;
    }
    if (text.length > MAX_CHARS) text = text.slice(0, MAX_CHARS) + '\n\n[…truncated]';

    if (summaryEl) {
      summaryEl.value = text;
      summaryEl.dispatchEvent(new Event('input', { bubbles: true }));
    }
    showToast('✓ Resume text extracted — review, then click Save');
  } catch (e) {
    console.error('[resume upload]', e);
    showToast('Couldn\'t read that file — paste a summary manually', 'red');
  }
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error('PDF reader not loaded');
  const buf = await file.arrayBuffer();
  const doc = await window.pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= doc.numPages; i++) {
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    pages.push(content.items.map(it => it.str).join(' '));
  }
  return pages.join('\n\n');
}

async function extractDocxText(file) {
  if (!window.mammoth) throw new Error('DOCX reader not loaded');
  const buf = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
  return result.value || '';
}

// ── ⑥ DATA WRITERS (via Apps Script) ─────────────────────────────────
// NOTE: when a coach is "viewing as" a client, writes target that client's row
// (viewedEmail()), so a preview behaves like the real client experience.
async function saveClientProfile(patch) {
  const email = viewedEmail();
  const client = state.client;
  const updatedQ = { ...(client.questionnaire || {}), ...patch.questionnaire };
  const updatedP = patch.profile !== undefined ? patch.profile : client.profile;
  Object.assign(state.client, patch);
  state.client.questionnaire = updatedQ;
  state.client.profile = updatedP;
  render();
  await scriptPost({
    action: 'save_client',
    email,
    name: state.client.name || currentUser.name,
    questionnaire: JSON.stringify(updatedQ),
    profile: JSON.stringify(updatedP),

const VoiceEngine = {
  recognition: null, speaking: false,
  init() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR && !this.recognition) {
      this.recognition = new SR();
      this.recognition.continuous = false;
      this.recognition.interimResults = true;
      this.recognition.lang = 'en-US';
    }
  },
  speak(text, onend) {
    if (!('speechSynthesis' in window)) { onend?.(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.08;   // +8% — slightly brisker, feels more natural/conversational
    u.pitch = 1.0;
    u.volume = 1.0;
    u.voice = pickBestVoice();
    u.onend = () => { this.speaking = false; onend?.(); };
    u.onerror = () => { this.speaking = false; onend?.(); };
    this.speaking = true;
    window.speechSynthesis.speak(u);
  },
  listen(onResult, onStatus) {
    this.init();
    if (!this.recognition) { onStatus?.('Speech recognition not supported. Try Chrome or Edge.'); return; }
    let final = '';
    this.recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal ? (final += e.results[i][0].transcript) : (interim += e.results[i][0].transcript);
      }
      onStatus?.((final + interim).trim() || 'Listening…');
    };
    this.recognition.onend = () => onResult(final.trim());
    this.recognition.onerror = (e) => { onStatus?.('Error: ' + e.error); onResult(final.trim()); };
    try { this.recognition.start(); onStatus?.('🔴 Listening… tap mic again to stop'); }
    catch(e) { onStatus?.('Allow microphone access and try again.'); }
  },
  stop() { try { this.recognition?.stop(); } catch(e) {} },
};

function generateVoiceFeedback(mode, answer) {
  const a = (answer || '').toLowerCase();
  const words = a.split(/\s+/).filter(Boolean).length;
  const strong = [], tips = [];
  if (words < 15) tips.push('Your answer was brief — aim for 60–90 seconds with a clear situation, action, and result.');
  if (words > 250) tips.push('Good detail, but tighten it to the 2–3 most important beats and end with the outcome.');
  if (mode === 'interview') {
    if (/(result|outcome|impact|led to|grew|saved|reduced|\d+%|\$\d)/i.test(answer)) strong.push('Nice — you mentioned a concrete outcome.');
    else tips.push('Add a measurable result: dollars, %, time saved, or users impacted.');
    if (/(situation|context|first|then|finally)/i.test(answer)) strong.push('Clear story structure — I could follow the arc.');
    else tips.push('Use STAR: set up the Situation, your Task, the Action you took, and the Result.');
    if (!/\bI\b/.test(answer)) tips.push("Use 'I' more than 'we' — the interviewer needs to see your individual contribution.");
  } else {
    if (/(range|band|market|before I|what'?s budgeted)/i.test(answer)) strong.push('Good — you deflected before naming a number.');
    else if (/\$?\d{3}|\bk\b/.test(answer)) tips.push("You anchored first — try flipping it: 'What range has been budgeted for this role?'");
    if (/(bonus|equity|signing|pto|vacation|start date|remote)/i.test(answer)) strong.push('Great — you expanded beyond base salary.');
    else tips.push('Remember to negotiate the full package: signing bonus, equity, PTO, start date.');
    if (/\bokay\b|\bsure\b|\bi guess\b/i.test(answer) && !/however|but|actually/i.test(answer)) tips.push("Watch for soft-acceptance language ('okay', 'sure'). You may be conceding implicitly.");
  }
  return [strong.map(s => '✅ ' + s).join('<br>'), tips.map(t => '🎯 ' + t).join('<br>')].filter(Boolean).join('<br><br>') || '✅ Solid answer. Try to be even more specific next time.';
}

function voiceStart() {
  const mode = state.voiceMode || 'interview';
  state.voiceSession = { started: true, idx: 0, transcripts: [], feedback: [] };
  render();
  setTimeout(() => {
    VoiceEngine.speak(VOICE_SCRIPTS[mode].intro, () => {
      VoiceEngine.speak(VOICE_SCRIPTS[mode].questions[0].q);
    });
  }, 300);
}
function voiceNext() {
  const mode = state.voiceMode || 'interview';
  const script = VOICE_SCRIPTS[mode];
  const s = state.voiceSession;
  if (!s) return;
  if (s.idx >= script.questions.length - 1) {
    s.idx = script.questions.length; render();
    VoiceEngine.speak('That wraps our session. Review the transcript and coaching notes below. Keep practicing — preparation turns nerves into confidence. Great work!');
    return;
  }
  s.idx++; render();
  setTimeout(() => VoiceEngine.speak(script.questions[s.idx].q), 150);
}
function voiceMicToggle() {
  if (VoiceEngine.speaking) window.speechSynthesis?.cancel();
  const btn = document.getElementById('micBtn');
  const statusEl = document.getElementById('micStatus');
  if (btn?.dataset.listening === '1') { VoiceEngine.stop(); btn.dataset.listening = '0'; return; }
  if (btn) { btn.dataset.listening = '1'; btn.classList.add('ring-4','ring-red-300'); }
  VoiceEngine.listen((final) => {
    if (btn) { btn.dataset.listening = '0'; btn.classList.remove('ring-4','ring-red-300'); }
    const mode = state.voiceMode || 'interview';
    const s = state.voiceSession;
    if (!s || !final) { statusEl && (statusEl.textContent = 'Didn\'t catch that — try again.'); return; }
    const q = VOICE_SCRIPTS[mode].questions[s.idx].q;
    const fb = generateVoiceFeedback(mode, final);
    s.transcripts.push({ question: q, answer: final });
    s.feedback.push(fb);
    render();
    VoiceEngine.speak(fb.replace(/<[^>]+>/g,' ').replace(/[✅🎯]/g,'').trim().slice(0,220), voiceNext);
  }, (msg) => { statusEl && (statusEl.textContent = msg); });
}

}

// ── PROFILE  ───────────────────────────────────────────────────────────
// Splits "Jane Smith Doe" into { first: "Jane", last: "Smith Doe" } so
// the client can control exactly how their name appears on applications.
function splitDisplayName(full) {
  const parts = (full || '').trim().split(/\s+/);
  if (parts.length <= 1) return { first: parts[0] || '', last: '' };
  return { first: parts[0], last: parts.slice(1).join(' ') };
}

function renderNameCard(c) {
  const { first, last } = splitDisplayName(c.name);
  return `
    <div class="card p-6">
      <div class="flex items-center justify-between mb-3">
        <div><h3 class="text-lg font-bold font-headline">How you appear on applications</h3><p class="text-xs text-gray-500">This is the name that will be used in generated resumes and cover letters. Signed in as <b>${c.email}</b>.</p></div>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">
        <div><label class="text-sm font-medium text-gray-700">First name</label>
          <input id="display-first-name" value="${first.replace(/"/g,'&quot;')}" class="mt-1 w-full border border-gray-300 rounded-xl p-2 text-sm" placeholder="Jane" /></div>
        <div><label class="text-sm font-medium text-gray-700">Last name</label>
          <input id="display-last-name" value="${last.replace(/"/g,'&quot;')}" class="mt-1 w-full border border-gray-300 rounded-xl p-2 text-sm" placeholder="Smith" /></div>
      </div>
      <button data-action="save-display-name" class="btn btn-primary mt-4 text-sm">Save name</button>
    </div>`;
}

// ── JOBS  ──────────────────────────────────────────────────────────────
// Per-job expansion state lives in memory on `state.jobUI[jobId]`. Losing it
// on reload is fine — it's just UX state.
function jobUI(id) { return (state.jobUI ||= {}) [id] ||= { details: false, apply: false }; }
function toggleJobUI(id, key) { const s = jobUI(id); s[key] = !s[key]; render(); }

// Clearbit's free logo endpoint. Falls back to a solid initial tile if the
// lookup 404s (which happens often for small/newer companies).
function companyLogo(job) {
  const website = job.extra?.website;
  const letter = (job.company || '?').charAt(0).toUpperCase();
  if (!website) {
    return `<div class="w-12 h-12 rounded-xl brand-grad text-white flex items-center justify-center font-bold font-headline text-xl shrink-0">${letter}</div>`;
  }
  return `<img src="https://logo.clearbit.com/${website}" alt="${job.company} logo"
    class="w-12 h-12 rounded-xl object-contain bg-white border border-[#e9dfcc] shrink-0"
    onerror="this.outerHTML='<div class=\\'w-12 h-12 rounded-xl brand-grad text-white flex items-center justify-center font-bold font-headline text-xl shrink-0\\'>${letter}</div>'" />`;
}

function renderStarRating(r) {
  if (!r) return '';
  const full = Math.round(r);
  return `<span class="inline-flex items-center gap-1 text-sm" title="Glassdoor ${r.toFixed(1)}">
    <span class="text-[#b45309]">${'★'.repeat(full)}${'☆'.repeat(5 - full)}</span>
    <span class="text-gray-600">${r.toFixed(1)}</span>
  </span>`;
}

function renderJobs(c) {
  if (!c.profile?.analyzed) return `<div class="card p-8 text-center"><p class="text-gray-600">Complete your intake first to unlock job search.</p></div>`;
  const jobs = c.jobs || [];
  return `
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div><h2 class="text-2xl font-bold font-headline">Job search</h2><p class="text-sm text-gray-500">Live matches based on your profile.</p></div>
    <div class="flex gap-2">
      <button data-action="toggle-alerts" class="btn btn-secondary">${c.dailyAlerts?'🔔 Alerts on':'🔕 Daily alerts'}</button>
      <button data-action="search-jobs" id="searchBtn" class="btn btn-primary">🔍 Find jobs now</button>
    </div>
  </div>
  <div id="searchStatus"></div>
  ${jobs.length === 0
    ? `<div class="card p-10 text-center"><div class="text-5xl mb-3">🎯</div><p class="text-gray-500">No jobs yet. Click <b>Find jobs now</b> to pull fresh matches.</p></div>`
    : `<div class="space-y-4">${jobs.map(j => renderJobCard(j, c)).join('')}</div>`
  }`;
}

function renderJobCard(j, c) {
  const ui = jobUI(j.id);

  const generated = j.extra?.application?.generated;
  return `
  <div class="card p-5">
    <div class="flex items-start gap-4">
      ${companyLogo(j)}
      <div class="flex-1 min-w-0">
        <div class="flex flex-wrap items-start justify-between gap-2">

            <div class="flex flex-wrap items-center gap-3 mt-2 text-xs text-gray-500">
              <span>via ${j.source} · ${j.posted}</span>
              ${j.extra?.company?.glassdoorRating ? `<span class="text-gray-300">|</span>${renderStarRating(j.extra.company.glassdoorRating)}` : ''}
              ${(j.extra?.company?.awards||[]).length ? `<span class="text-gray-300">|</span><span class="inline-flex items-center gap-1 text-[#7a3620]">🏆 ${j.extra.company.awards[0]}${j.extra.company.awards.length>1?` +${j.extra.company.awards.length-1}`:''}</span>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            ${matchChip(j.match)}${statusChip(j.status)}
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 mt-4">
          ${j.url ? `<a href="${j.url}" target="_blank" rel="noopener" class="btn btn-secondary text-xs inline-flex items-center gap-1">🔗 View posting</a>` : ''}
          <button data-action="toggle-job-details" data-job="${j.id}" class="btn btn-secondary text-xs">
            ${ui.details ? '▲ Hide details' : '▼ Details'}
          </button>
          <button data-action="toggle-job-apply" data-job="${j.id}" class="btn btn-primary text-xs">

      </div>
    </div>
  </div>`;
}

function renderJobDetailsPanel(j) {
  const co = j.extra?.company || {};
  const desc = j.extra?.description || '';
  return `
  <div class="mt-5 border-t border-[#e9dfcc] pt-4 space-y-4">

      ${desc ? `<button data-action="edit-job-desc" data-job="${j.id}" class="btn btn-ghost text-xs mt-1">Edit description</button>` : ''}
    </div>
    <div>
      <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-2">Company & culture</div>

        <button data-action="edit-coach-company-notes" data-job="${j.id}" class="btn btn-secondary text-xs">Edit coach notes</button>
        <button data-action="edit-notes" data-job="${j.id}" data-notes="${encodeURIComponent(j.notes||'')}" class="btn btn-secondary text-xs">Edit job notes</button>
      </div>
    </div>
  </div>`;
}

function renderJobApplyPanel(j, c) {
  const app = j.extra?.application || {};
  const submitted = j.extra?.submission?.submitted;
  if (submitted) {
    return `
    <div class="mt-5 border-t border-[#e9dfcc] pt-4">
      <div class="bg-[#eef3e8] border border-[#d5dfc4] rounded-xl p-4 text-sm">
        <div class="font-semibold text-[#4a5c3e]">✓ Submitted on ${(j.extra.submission.submittedAt || '').slice(0,10) || 'the employer site'}</div>
        <div class="text-gray-600 mt-1">Status moved to <b>Applied</b>. Track progress using the status dropdown above.</div>
      </div>
    </div>`;
  }
  if (!app.generated) {
    return `
    <div class="mt-5 border-t border-[#e9dfcc] pt-4">
      <div class="bg-[#fffdf8] border border-dashed border-[#e9dfcc] rounded-xl p-5 text-center">
        <div class="text-3xl mb-2">✨</div>
        <h4 class="font-bold font-headline text-lg">Draft tailored application materials</h4>
        <p class="text-sm text-gray-500 mt-1 max-w-md mx-auto">We'll generate a tailored resume, cover letter, and outreach message for <b>${j.title}</b> at <b>${j.company}</b>. Review, tweak, then submit on the employer site yourself.</p>
        <button data-action="generate-materials" data-job="${j.id}" class="btn btn-primary mt-4">Generate drafts →</button>
      </div>
    </div>`;
  }
  return `
  <div class="mt-5 border-t border-[#e9dfcc] pt-4 space-y-4">
    <div class="flex items-center justify-between">
      <div class="text-xs font-semibold uppercase tracking-wide text-gray-500">Draft application materials</div>
      <button data-action="regenerate-materials" data-job="${j.id}" class="btn btn-ghost text-xs">🔄 Regenerate</button>
    </div>

    ${renderMaterialBlock('Tailored resume', 'resume', app.resume, j.id)}
    ${renderMaterialBlock('Cover letter',    'coverLetter', app.coverLetter, j.id)}
    ${renderMaterialBlock('Outreach message (recruiter DM)', 'outreach', app.outreach, j.id)}

    <div class="bg-[#f5ede0] border border-[#e9dfcc] rounded-xl p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
      <div>
        <div class="font-semibold text-[#2d1c10]">Ready to submit?</div>
        <div class="text-xs text-gray-600">Review everything above, then submit on the employer site. When you're done, mark this job as submitted so we can track it.</div>
      </div>
      <div class="flex gap-2 shrink-0">
        ${j.url ? `<a href="${j.url}" target="_blank" rel="noopener" class="btn btn-secondary text-sm">Open posting →</a>` : ''}
        <button data-action="mark-submitted" data-job="${j.id}" class="btn btn-primary text-sm">✓ I submitted this</button>
      </div>
    </div>
  </div>`;
}

function renderMaterialBlock(label, key, content, jobId) {
  const safeContent = (content || '').replace(/</g, '&lt;');
  return `
  <div>
    <div class="flex items-center justify-between mb-1">
      <div class="text-sm font-semibold">${label}</div>
      <div class="flex gap-1">
        <button data-action="copy-material" data-job="${jobId}" data-field="${key}" class="btn btn-ghost text-xs">📋 Copy</button>
        <button data-action="edit-material" data-job="${jobId}" data-field="${key}" class="btn btn-ghost text-xs">✎ Edit</button>
      </div>
    </div>

// ── PREP  ──────────────────────────────────────────────────────────────
function renderPrep(c) {
  if (!c.profile?.analyzed) return `<div class="card p-8 text-center"><p class="text-gray-600">Complete intake first.</p></div>`;
  const ip = c.interviewPrep || { sessions:[], completed:0, total:0 };
  const pct = ip.total ? Math.round((ip.completed/ip.total)*100) : 0;
  const defaultSessions = ip.sessions.length ? ip.sessions : [
    { id:'ps1',type:'Behavioral / STAR storytelling',status:'todo',score:null,note:'' },
    { id:'ps2',type:'Role-specific case / scenario',status:'todo',score:null,note:'' },
    { id:'ps3',type:'Stakeholder or conflict roleplay',status:'todo',score:null,note:'' },
    { id:'ps4',type:'Compensation negotiation',status:'todo',score:null,note:'' },
    { id:'ps5',type:'Final round / exec-level',status:'todo',score:null,note:'' },
  ];
  const qs = mockInterviewQuestions(c, (c.jobs||[]).find(j=>j.status==='interviewing')?.title);
  return `
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 space-y-6">
      <div class="card p-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-xl font-bold font-headline">Prep plan</h2>
          <span class="text-sm text-gray-500">${ip.completed}/${defaultSessions.length} done</span>
        </div>
        <div class="progress-bar mb-5"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="space-y-2">
          ${defaultSessions.map(s=>`
          <div class="flex items-center justify-between p-3 rounded-xl border ${s.status==='done'?'bg-green-50 border-green-100':s.status==='in_progress'?'bg-amber-50 border-amber-100':'bg-gray-50 border-gray-100'}">
            <div>
              <div class="font-medium text-sm text-gray-900">${s.type}</div>
              ${s.note?`<div class="text-xs text-gray-500 mt-0.5">${s.note}</div>`:''}
            </div>
            <div class="flex items-center gap-3">
              ${s.score!==null?`<span class="font-bold text-sm text-gray-700">${s.score}</span>`:''}
              <select data-action="prep-status" data-session="${s.id}" class="text-xs border border-gray-300 rounded px-2 py-1">
                ${['todo','in_progress','done'].map(v=>`<option value="${v}" ${s.status===v?'selected':''}>${v.replace('_',' ')}</option>`).join('')}
              </select>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card p-6">
        <h3 class="font-bold mb-3">Tailored questions</h3>
        <ul class="space-y-2 text-sm text-gray-700">${qs.scenarios.map(q=>`<li class="flex gap-2"><span class="text-[#a64c2c] font-bold shrink-0">Q.</span>${q}</li>`).join('')}</ul>
        <h4 class="font-bold mt-5 mb-2">Common questions</h4>
        <ul class="space-y-1 text-sm text-gray-700">${qs.common.map(q=>`<li>• ${q}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="space-y-5">
      <div class="card p-6">
        <h3 class="font-bold mb-3">Coaching tips</h3>
        <ul class="space-y-2 text-sm">${qs.tips.map(t=>`<li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">💡</span>${t}</li>`).join('')}</ul>
      </div>
      <div class="card p-6 brand-grad text-white">
        <h3 class="font-bold">Practice with your coach</h3>
        <p class="text-sm opacity-90 mt-1">Book a live mock interview session tailored to a specific role.</p>
        <a href="mailto:${CONFIG.COACH_EMAILS[0]}?subject=Mock interview request" class="inline-block mt-3 bg-white text-[#7a3620] font-semibold rounded-xl px-4 py-2 text-sm">Request session</a>
      </div>
    </div>
  </div>`;
}

// ── VOICE COACH  ───────────────────────────────────────────────────────
function renderVoice() {
  const mode = state.voiceMode || 'interview';
  const script = VOICE_SCRIPTS[mode];
  const session = state.voiceSession || { started:false,idx:0,transcripts:[],feedback:[] };
  const supported = ('speechSynthesis' in window) && (('webkitSpeechRecognition' in window)||('SpeechRecognition' in window));
  return `
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 space-y-6">
      <div class="card p-6">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
          <div><h2 class="text-xl font-bold font-headline">🎙️ Voice Coach</h2><p class="text-sm text-gray-500">Speak your answers aloud and get real-time coaching.</p></div>
          <div class="inline-flex bg-gray-100 rounded-xl p-1">
            <button data-action="voice-mode" data-mode="interview" class="nav-btn ${mode==='interview'?'active':''}">Interview</button>
            <button data-action="voice-mode" data-mode="negotiation" class="nav-btn ${mode==='negotiation'?'active':''}">Negotiation</button>
          </div>
        </div>
        ${!supported?`<div class="p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-900 mb-4">⚠️ Open in <b>Chrome</b> or <b>Edge</b> for voice features. Allow mic access when prompted.</div>`:''}
        <div class="rounded-2xl bg-gradient-to-br from-[#f5ede0] via-[#fffdf8] to-[#ecece0] border border-[#e9dfcc] p-6">
          <div class="flex items-start gap-4">
            <div class="w-14 h-14 brand-grad rounded-full flex items-center justify-center text-2xl shrink-0 shadow" id="coachAvatar">🎙️</div>
            <div class="flex-1 min-w-0">
              <div class="text-xs uppercase tracking-wide text-[#a64c2c] font-semibold">Careers by Design · ${script.title}</div>
              <div id="coachSpeech" class="mt-1 text-gray-900 leading-relaxed text-sm">${session.started?(script.questions[session.idx]?.q||'Session complete — great work!'):(script.intro)}</div>
            </div>
          </div>
          <div class="mt-6 flex flex-col items-center gap-3">
            ${!session.started?`
              <button data-action="voice-start" class="btn btn-primary px-8 py-3 text-base">▶️ Start session</button>
              <p class="text-xs text-gray-500">${script.questions.length} questions · ~${script.questions.length*2} min</p>` : `
              <button id="micBtn" data-action="voice-mic" class="w-20 h-20 rounded-full brand-grad text-white flex items-center justify-center text-4xl shadow-lg hover:scale-105 transition">🎤</button>
              <div id="micStatus" class="text-sm text-gray-500">Tap the mic and answer aloud</div>
              <div class="flex gap-2 mt-1">
                <button data-action="voice-replay" class="btn btn-secondary text-sm">🔁 Repeat</button>
                <button data-action="voice-skip" class="btn btn-secondary text-sm">⏭️ Skip</button>
                <button data-action="voice-end" class="btn btn-secondary text-sm">⏹️ End</button>
              </div>`}
          </div>
          ${session.started?`<div class="mt-5"><div class="flex justify-between text-xs text-gray-500 mb-1"><span>Question ${Math.min(session.idx+1,script.questions.length)} of ${script.questions.length}</span><span>${Math.round(session.idx/script.questions.length*100)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${session.idx/script.questions.length*100}%"></div></div></div>`:''}
        </div>
      </div>
      ${session.transcripts.length?`
      <div class="card p-6">
        <h3 class="font-bold mb-4">Session transcript & coaching</h3>
        <div class="space-y-5">
          ${session.transcripts.map((t,i)=>`<div><div class="text-xs font-semibold uppercase text-gray-500">Q${i+1}</div><div class="text-sm text-gray-800 mt-1">${t.question}</div><div class="text-xs font-semibold uppercase text-gray-500 mt-3">You said</div><div class="text-sm bg-gray-50 rounded-xl p-3 border border-gray-100 mt-1">"${t.answer}"</div><div class="text-xs font-semibold uppercase text-[#a64c2c] mt-3">💡 Coaching</div><div class="text-sm mt-1">${session.feedback[i]||''}</div></div>`).join('<hr class="border-gray-100"/>')}
        </div>
      </div>`:''}
    </div>
    <div class="space-y-5">
      <div class="card p-6">
        <h3 class="font-bold mb-3">${mode==='interview'?'Interview tips':'Negotiation tactics'}</h3>
        <ul class="space-y-2 text-sm text-gray-700">
          ${mode==='interview'?`
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Use <b>STAR</b>: Situation, Task, Action, Result.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Quantify outcomes — revenue, %, users, time.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Keep answers to 60–90 seconds.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>End every story with what you learned.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Prepare 3 smart questions for the hiring manager.</li>
          `:`
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Never name a number first — ask for their range.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>After countering, <b>stay silent</b>.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Negotiate <b>total comp</b>: base, bonus, equity, PTO.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Cite market data: "Based on ranges I'm seeing…"</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Get everything <b>in writing</b> before accepting verbally.</li>
            <li class="flex gap-2"><span class="text-[#6d7a52] shrink-0">•</span>Know your BATNA — your walk-away alternative.</li>
          `}
        </ul>
      </div>
      <div class="card p-6 brand-grad text-white">
        <h3 class="font-bold">Privacy note</h3>
        <p class="text-sm opacity-90 mt-1">Your voice is processed entirely in your browser using the Web Speech API. Nothing is recorded or sent to a server.</p>
      </div>
    </div>
  </div>`;
}

// ── DASHBOARD  ────────────────────────────────────────────────────────
function renderDashboard(c) {
  const jobs = c.jobs || [];
  const counts = jobs.reduce((a,j)=>{a[j.status]=(a[j.status]||0)+1;return a;},{});

              <td class="text-gray-700">${c.questionnaire?.roleTarget||'<span class="text-gray-400">— intake pending</span>'}</td>

  return `<div class="min-h-screen flex flex-col items-center justify-center gap-4 text-gray-500">
    <div class="w-14 h-14 brand-grad rounded-2xl flex items-center justify-center shadow">${compassSVG(28)}</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="text-sm">${msg||'Loading…'}</div>
  </div>`;
}
function showLoadingScreen(msg) { state = { page:'loading', loadingMsg:msg }; render(); }

// ── CHIPS  ────────────────────────────────────────────────────────────
function statusChip(s) {
  const map={new:'chip-gray',interested:'chip-blue',applied:'chip-purple',interviewing:'chip-amber',offer:'chip-green',rejected:'chip-red'};
  const label={new:'New',interested:'Interested',applied:'Applied',interviewing:'Interviewing',offer:'Offer 🎉',rejected:'Rejected'};
  return `<span class="chip ${map[s]||'chip-gray'}">${label[s]||s}</span>`;
}
function matchChip(m) {
  return `<span class="chip ${m>=90?'chip-green':m>=80?'chip-blue':m>=70?'chip-amber':'chip-gray'}">${m}% match</span>`;
}

// ── TOAST  ────────────────────────────────────────────────────────────
function showToast(msg, color='green') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;transition:opacity .3s'; document.body.appendChild(t); }
  t.innerHTML = `<div style="background:${color==='red'?'#dc2626':'#059669'};color:white;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2)">${msg}</div>`;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; }, 2500);
}

// ── EVENTS  ───────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'click';
    el.addEventListener(evt, handleAction);
  });
}

async function handleAction(e) {
  const el = e.currentTarget;
  const a = el.dataset.action;
  const c = state.client;

  switch(a) {
    case 'sign-in': signIn(); break;
    case 'sign-out': signOut(); break;

    case 'view-as': {
      // Dropdown in header — switch between coach dashboard and a client preview.
      const v = el.value;
      viewAs = (v === '__coach__') ? null : v;
      await loadAndBoot();
      break; }
    case 'view-as-client': {
      // Button in coach dashboard / drawer — open a specific client's view.
      viewAs = el.dataset.email || 'self';
      await loadAndBoot();
      break; }
    case 'exit-view-as':
      viewAs = null;
      await loadAndBoot();
      break;

    case 'complete-register': {
      const name = document.getElementById('reg-name')?.value?.trim();
      if (!name) { showToast('Enter your name', 'red'); break; }
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Creating…';
      await registerNewClient(name); break; }

    case 'set-tab': setState({ tab: el.dataset.tab }); break;
    case 'refresh': await loadAndBoot(); break;

    case 'save-display-name': {
      const first = document.getElementById('display-first-name')?.value?.trim() || '';
      const last  = document.getElementById('display-last-name')?.value?.trim() || '';
      if (!first) { showToast('First name is required', 'red'); break; }
      const fullName = (first + ' ' + last).trim();
      state.client.name = fullName;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Saving…';
      await saveClientProfile({ name: fullName });
      break; }

    case 'save-resume': {
      const summary = document.getElementById('resume-summary')?.value?.trim();
      const fileName = document.getElementById('resume-filename')?.value?.trim();
      if (!summary) { showToast('Paste a resume summary first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving…';
      await saveClientProfile({ resume:{uploaded:true,summary,fileName}, questionnaire:{...(c.questionnaire||{}),resumeSummary:summary,resumeFile:fileName} });
      break; }

    case 'clear-resume':
      await saveClientProfile({ resume:{uploaded:false,summary:'',fileName:''}, questionnaire:{...(c.questionnaire||{}),resumeSummary:'',resumeFile:''} }); break;

    case 'save-questionnaire': {
      const q = {
        workStyle: document.getElementById('q-workStyle')?.value,
        roleTarget: document.getElementById('q-roleTarget')?.value?.trim(),
        locationPref: document.getElementById('q-locationPref')?.value?.trim(),
        salaryFloor: parseCurrency(document.getElementById('q-salaryFloor')?.value),
        strengths: document.getElementById('q-strengths')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        industries: document.getElementById('q-industries')?.value?.split(',').map(s=>s.trim()).filter(Boolean),
        energizers: document.getElementById('q-energizers')?.value?.trim(),
        drainers: document.getElementById('q-drainers')?.value?.trim(),
        resumeSummary: c.questionnaire?.resumeSummary,
        resumeFile: c.questionnaire?.resumeFile,
      };
      if (!q.roleTarget) { showToast('Enter a target role first', 'red'); break; }
      el.disabled=true; el.innerHTML='<span class="spinner"></span> Saving & analyzing…';
      let profile;
      try {
        const resp = await scriptCall({ action: 'analyze_profile', email: viewedEmail(), questionnaire: q });
        profile = resp.configured && resp.profile ? resp.profile : mockAnalyzeProfile(q);
        if (!resp.configured) {
          showToast('Using sample analysis — set ANTHROPIC_API_KEY for real output', 'red');
        }
      } catch (e) {
        console.error(e);
        profile = mockAnalyzeProfile(q);
        showToast('Analysis failed — showing sample', 'red');
      }
      await saveClientProfile({ questionnaire:q, profile, resume:{...(c.resume||{}),uploaded:!!q.resumeSummary} });
      setState({ tab:'profile' }); break; }

    case 'search-jobs': {
      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('searchStatus');
      if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Scanning…'; }
      if (status) status.innerHTML=`<div class="card p-4 mb-4 bg-[#f5ede0] border-[#e9dfcc]"><div class="flex items-center gap-3 text-[#2d1c10]"><span class="loading-dots"><span></span><span></span><span></span></span><span>Pulling fresh listings…</span></div></div>`;
      try {
        const resp = await scriptCall({ action: 'search_jobs', email: viewedEmail(), questionnaire: c.questionnaire || {} });
        let fresh;
        if (resp.configured && Array.isArray(resp.jobs)) {
          // Stamp clientEmail on real results so they save under the right row
          fresh = resp.jobs.map(j => ({ ...j, clientEmail: viewedEmail() }));
        } else {
          fresh = mockJobSearch(c.questionnaire || {});
          showToast('Using sample jobs — set RAPIDAPI_KEY for live results', 'red');
        }
        const existingIds = new Set((c.jobs || []).map(j => j.id));
        const newJobs = fresh.filter(j => !existingIds.has(j.id));
        await addJobs(newJobs);
      } catch (e) {
        console.error(e);
        showToast('Job search failed — ' + (e.message || 'see console'), 'red');
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Find jobs now'; }
        if (status) status.innerHTML = '';
      }
      break; }

    case 'toggle-alerts':
      await saveClientProfile({ dailyAlerts: !c.dailyAlerts }); break;

    case 'job-status': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      job.status = el.value;
      render();
      await saveJob(job); break; }

    case 'toggle-job-details': toggleJobUI(el.dataset.job, 'details'); break;
    case 'toggle-job-apply':   toggleJobUI(el.dataset.job, 'apply');   break;

    case 'generate-materials':
    case 'regenerate-materials': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      el.disabled = true; el.innerHTML = '<span class="spinner"></span> Drafting with Claude…';
      try {
        const resp = await scriptCall({ action: 'generate_materials', email: viewedEmail(), job });
        if (resp.configured && resp.materials) {
          job.extra = job.extra || {};
          job.extra.application = resp.materials;
        } else {
          // API key not set yet — use the stub so the UX still works
          job.extra = job.extra || {};
          job.extra.application = mockApplicationMaterials(job, c);
          showToast('Using draft stub — set ANTHROPIC_API_KEY in Script Properties for real output', 'red');
        }
      } catch (e) {
        console.error(e);
        showToast('Draft failed — ' + (e.message || 'see console'), 'red');
        break;
      }
      jobUI(jid).apply = true;
      render();
      await saveJob(job);
      showToast('✨ Drafts ready — review, tweak, then submit');
      break; }

    case 'mark-submitted': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      job.extra = job.extra || {};
      job.extra.submission = { submitted: true, submittedAt: new Date().toISOString() };
      job.status = 'applied';
      render();
      await saveJob(job);
      showToast('✓ Marked as submitted');
      break; }

    case 'copy-material': {
      const jid = el.dataset.job;
      const field = el.dataset.field;
      const job = c.jobs.find(j => j.id === jid);
      const text = job?.extra?.application?.[field] || '';
      try { await navigator.clipboard.writeText(text); showToast('Copied to clipboard ✓'); }
      catch { showToast('Copy failed — select the text manually', 'red'); }
      break; }

    case 'edit-material': {
      const jid = el.dataset.job;
      const field = el.dataset.field;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const current = job.extra?.application?.[field] || '';
      const updated = prompt('Edit — your changes are saved when you hit OK:', current);
      if (updated === null) break;
      job.extra = job.extra || {};
      job.extra.application = { ...(job.extra.application || {}), [field]: updated };
      render();
      await saveJob(job);
      break; }

    case 'edit-job-desc': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const v = prompt('Job description:', job.extra?.description || '');
      if (v === null) break;
      job.extra = { ...(job.extra || {}), description: v };
      render();
      await saveJob(job);
      break; }

    case 'edit-company-info': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const co = job.extra?.company || {};
      const industry = prompt('Industry:', co.industry || ''); if (industry === null) break;
      const size = prompt('Company size (e.g. 51-200):', co.size || ''); if (size === null) break;
      const gs = prompt('Glassdoor rating (0-5):', co.glassdoorRating || ''); if (gs === null) break;
      const awards = prompt('Awards / certs (comma-separated):', (co.awards || []).join(', '));
      if (awards === null) break;
      const website = prompt('Website domain (for logo, e.g. linear.app):', job.extra?.website || '');
      if (website === null) break;
      job.extra = {
        ...(job.extra || {}),
        website: website.trim(),
        company: {
          ...co,
          industry: industry.trim(),
          size: size.trim(),
          glassdoorRating: parseFloat(gs) || 0,
          awards: awards.split(',').map(s => s.trim()).filter(Boolean),
        },
      };
      render();
      await saveJob(job);
      break; }

    case 'edit-coach-company-notes': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j => j.id === jid);
      if (!job) break;
      const v = prompt('Coach notes about this company (visible to the client):', job.extra?.company?.coachNotes || '');
      if (v === null) break;
      job.extra = { ...(job.extra || {}), company: { ...(job.extra?.company || {}), coachNotes: v } };
      render();
      await saveJob(job);
      break; }

    case 'edit-notes': {
      const jid = el.dataset.job;
      const job = c.jobs.find(j=>j.id===jid);
      if (!job) break;
      const v = prompt('Notes for ' + job.title + ':', decodeURIComponent(el.dataset.notes||''));
      if (v === null) break;
      job.notes = v; render();
      await saveJob(job); break; }

    case 'prep-status': {
      const sid = el.dataset.session;
      const ip = c.interviewPrep;
      const s = ip.sessions.find(x=>x.id===sid);
      if (!s) {
        // session not yet in Sheets — create it with the new status
        const defaultTypes={ps1:'Behavioral / STAR storytelling',ps2:'Role-specific case / scenario',ps3:'Stakeholder or conflict roleplay',ps4:'Compensation negotiation',ps5:'Final round / exec-level'};
        const newS = { id:sid, type:defaultTypes[sid]||'Session', status:el.value, score:null, note:'' };
        ip.sessions.push(newS);
        ip.total = ip.sessions.length;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(newS);
      } else {
        s.status = el.value;
        ip.completed = ip.sessions.filter(x=>x.status==='done').length;
        render();
        await savePrepSession(s);
      } break; }

    case 'save-notes': {
      const notes = document.getElementById('dash-notes')?.value || '';
      c.dashboardNotes = notes;
      await saveClientProfile({ dashboardNotes: notes }); break; }

    case 'voice-mode':
      state.voiceSession = null;
      setState({ voiceMode: el.dataset.mode }); break;
    case 'voice-start': voiceStart(); break;
    case 'voice-mic': voiceMicToggle(); break;
    case 'voice-replay': { const q=VOICE_SCRIPTS[state.voiceMode||'interview'].questions[state.voiceSession?.idx]?.q; if(q) VoiceEngine.speak(q); break; }
    case 'voice-skip': voiceNext(); break;
    case 'voice-end': VoiceEngine.stop(); window.speechSynthesis?.cancel(); setState({ voiceSession:null }); break;

    case 'open-drawer': {
      const email = el.dataset.email;
      const dc = (state.clients||[]).find(x=>x.email===email);
      setState({ drawerClient: dc }); break; }

    case 'close-drawer':
      if (e.target===el || el.dataset.action==='close-drawer') setState({ drawerClient:null }); break;

    case 'clear-alerts': {
      const email = el.dataset.email;
      await clearCoachAlerts(email); break; }

    case 'save-coach-notes': {
      const email = el.dataset.email;
      const notes = document.getElementById('coach-notes-field')?.value||'';
      const dc = (state.clients||[]).find(x=>x.email===email);
      if (dc) dc.coachNotes = notes;
      await saveCoachNotes(email, notes); break; }
  }
}

// ── BOOT  ─────────────────────────────────────────────────────────────
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Picks the best-sounding English voice the browser offers, ranked by our
// subjective quality preferences. Edge (Azure neural) > Chrome's Google
// Neural2 > macOS premium voices > anything en-US. Returns null if nothing
// matches — the browser will then use its platform default, which is fine.
function pickBestVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices?.length) return null;
  const ranked = [
    // Edge / Azure neural — very natural, multiple voices
    v => /Microsoft.*(Aria|Jenny|Emma|Guy|Davis|Jason|Sara|Tony).*Online.*Neural/i.test(v.name),
    v => /Microsoft.*(Aria|Jenny|Emma|Sara).*Neural/i.test(v.name),
    // Chrome Google US neural
    v => /Google US English/i.test(v.name) && /en-US/i.test(v.lang),
    v => /en-US-Neural2/i.test(v.voiceURI || v.name),
    // macOS premium ("enhanced") voices
    v => /(Samantha|Alex|Ava|Karen|Serena).*Premium/i.test(v.name),
    v => /Samantha|Alex|Ava|Karen|Serena/i.test(v.name),
    // Any Google or enhanced English voice
    v => /Google/i.test(v.name) && /en/i.test(v.lang),
    v => /en-US/i.test(v.lang),
    v => /en/i.test(v.lang),
  ];
  for (const test of ranked) {
    const hit = voices.find(test);
    if (hit) return hit;
  }
  return voices[0] || null;
}
if (SETUP_COMPLETE) {
  initAuth();
  // If we have a still-valid saved session, jump straight back into the app
  // instead of showing the login screen on every refresh.
  const saved = loadSession();
  if (saved) {
    accessToken  = saved.accessToken;
    currentUser  = saved.user;
    loadAndBoot();   // shows the loading screen, then routes to client/coach view
  } else {
    render();
  }
} else {
  render();
}
</script>
